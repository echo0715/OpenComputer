<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synthetic Pipeline — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/static/opencomputer.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fbfaf7;
      --paper: #ffffff;
      --paper-2: #faf8f3;
      --ink: #1a1a1a;
      --ink-soft: #3a3a3a;
      --muted: #6b6b6b;
      --muted-2: #8a8a8a;
      --rule: #e5e2db;
      --rule-soft: #efece6;
      --accent: #b04a2f;
      --accent-soft: #f3e1d8;
      --accent-glow: rgba(176,74,47,0.18);
      --link: #2a5db0;
      --code-bg: #f4f1ea;
      --ok: #2f7a4f;
      --ok-soft: #e3f0e7;
      --warn: #b07a1a;
      --warn-soft: #f5ecd6;
      --fail: #b03a3a;
      --fail-soft: #f3dada;
      --idle: #8a8a8a;
      --idle-soft: #ebe8e1;
      --max-w: 1320px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--ink);
      line-height: 1.55; font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code, .mono { font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace; }
    button, input, select, textarea { font-family: inherit; font-size: inherit; }
    input, select, textarea {
      border: 1px solid var(--rule); border-radius: 8px;
      padding: 0.45rem 0.65rem; background: var(--paper); color: var(--ink);
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(176,74,47,0.12);
    }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    label { font-size: 0.82rem; font-weight: 600; color: var(--ink-soft); display: block; margin-bottom: 0.3rem; }
    .form-row input, .form-row select, .form-row textarea { width: 100%; display: block; }

    .topbar {
      border-bottom: 1px solid var(--rule);
      background: rgba(251,250,247,0.92);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 60;
    }
    .topbar-inner {
      max-width: var(--max-w); margin: 0 auto;
      padding: 0.8rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .brand {
      display: flex; align-items: center; gap: 0.6rem;
      font-family: "Source Serif 4", serif;
      font-weight: 700; font-size: 1.05rem; letter-spacing: -0.01em;
    }
    .brand .logo {
      width: 26px; height: 26px; border-radius: 7px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .brand .logo img { width: 100%; height: 100%; display: block; }
    .brand-sub {
      font-family: "Inter", sans-serif; font-weight: 400; color: var(--muted);
      font-size: 0.83rem;
      padding-left: 0.6rem; margin-left: 0.2rem;
      border-left: 1px solid var(--rule);
    }
    .topbar-spacer { flex: 1; }
    .topbar-actions { display: flex; align-items: center; gap: 0.5rem; }

    .section-tabs {
      display: flex;
      background: var(--rule-soft);
      border-radius: 999px;
      padding: 0.18rem;
      gap: 0.15rem;
      margin-left: 1rem;
    }
    .section-tab {
      border: none; background: transparent;
      padding: 0.42rem 1.05rem;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.85rem; font-weight: 600;
      color: var(--muted); cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .section-tab:hover { color: var(--ink); }
    .section-tab.active { background: var(--ink); color: #fff; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      border: 1px solid var(--rule);
      background: var(--paper);
      color: var(--ink-soft);
      font-size: 0.84rem; font-weight: 600;
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--ink); color: var(--ink); text-decoration: none; }
    .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
    .btn.primary:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.accent:hover { filter: brightness(0.92); border-color: var(--accent); color: #fff; }
    .btn.ok { background: var(--ok); color: #fff; border-color: var(--ok); }
    .btn.ok:hover { filter: brightness(0.92); color: #fff; }
    .btn.danger { background: var(--fail); color: #fff; border-color: var(--fail); }
    .btn.danger:hover { filter: brightness(0.92); color: #fff; }
    .btn.ghost { background: transparent; }
    .btn.sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; }
    .btn.xs { padding: 0.22rem 0.5rem; font-size: 0.74rem; border-radius: 6px; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    .shell {
      max-width: var(--max-w); margin: 0 auto;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 1.5rem;
      padding: 1.5rem;
    }
    @media (max-width: 980px) { .shell { grid-template-columns: 1fr; } }

    .sidebar {
      position: sticky; top: 70px;
      align-self: start;
      max-height: calc(100vh - 90px);
      overflow-y: auto;
    }
    .sidebar-section { margin-bottom: 1.4rem; }
    .sidebar-section h3 {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted-2);
      margin-bottom: 0.5rem; padding: 0 0.5rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .sidebar-section h3 .count {
      background: var(--rule-soft); color: var(--ink-soft);
      padding: 0.05rem 0.4rem; border-radius: 999px;
      font-size: 0.65rem; letter-spacing: 0.05em;
    }
    .sidebar-search {
      display: block; width: 100%;
      margin: 0 0 0.5rem;
      font-size: 0.84rem;
      padding: 0.35rem 0.55rem;
    }
    .app-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
    .app-item {
      display: flex; align-items: center; gap: 0.55rem;
      padding: 0.55rem 0.6rem;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .12s, border-color .12s;
    }
    .app-item:hover { background: var(--rule-soft); }
    .app-item.active {
      background: var(--paper);
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(176,74,47,0.06);
    }
    .app-item .ai-icon {
      width: 26px; height: 26px;
      border-radius: 7px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: "JetBrains Mono", monospace;
      font-weight: 700; font-size: 0.74rem;
      color: var(--ink-soft);
      flex-shrink: 0;
    }
    .app-item .ai-name {
      font-weight: 600; font-size: 0.9rem;
      flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .app-item .ai-dot { width: 7px; height: 7px; border-radius: 50%; }
    .ai-dot.idle  { background: var(--idle); }
    .ai-dot.run   { background: var(--accent); animation: ai-pulse 1.4s infinite; }
    .ai-dot.pass  { background: var(--ok); }
    .ai-dot.warn  { background: var(--warn); }
    .ai-dot.fail  { background: var(--fail); }
    @keyframes ai-pulse {
      0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
      50%     { box-shadow: 0 0 0 5px rgba(176,74,47,0); }
    }
    .add-app {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 0.6rem;
      border: 1px dashed var(--rule); border-radius: 8px;
      color: var(--muted);
      font-size: 0.84rem; font-weight: 500;
      cursor: pointer;
      background: transparent;
      width: 100%;
      transition: all .12s;
      margin-bottom: 0.5rem;
    }
    .add-app:hover { color: var(--accent); border-color: var(--accent); background: var(--paper); }
    .sidebar-empty {
      padding: 0.7rem 0.6rem;
      font-size: 0.84rem; color: var(--muted);
      font-style: italic;
    }

    .main { min-width: 0; }
    .app-header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }
    .app-header .ah-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: "JetBrains Mono", monospace;
      font-weight: 700; font-size: 1.05rem;
    }
    .app-header h1 {
      font-family: "Source Serif 4", serif;
      font-size: 1.7rem; font-weight: 700;
      letter-spacing: -0.012em;
    }
    .app-header .ah-meta {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem; color: var(--muted);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .app-header-actions { margin-left: auto; display: flex; gap: 0.4rem; flex-wrap: wrap; }

    .stepper {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 1rem 1rem 1.1rem;
      margin-bottom: 1.2rem;
      box-shadow: 0 2px 10px rgba(26,26,26,0.03);
    }
    .stepper-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
    @media (max-width: 720px) { .stepper-row { grid-template-columns: 1fr 1fr; } }

    .step {
      position: relative;
      padding: 0.7rem 0.8rem;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s;
      display: flex; gap: 0.65rem; align-items: flex-start;
    }
    .step:hover { background: var(--rule-soft); }
    .step.selected { background: var(--rule-soft); }
    .step.selected::after {
      content: "";
      position: absolute;
      bottom: -8px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 7px solid var(--rule-soft);
    }
    .step::before {
      content: ""; position: absolute;
      top: 22px; right: -2px;
      width: 4px; height: 2px;
      background: var(--rule);
    }
    .step:last-child::before { display: none; }
    .step-bullet {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--rule-soft);
      color: var(--muted);
      display: inline-flex; align-items: center; justify-content: center;
      font-family: "JetBrains Mono", monospace;
      font-weight: 700; font-size: 0.78rem;
      flex-shrink: 0;
      transition: background .15s, color .15s;
      border: 2px solid var(--rule-soft);
    }
    .step-body { min-width: 0; flex: 1; }
    .step-name {
      font-weight: 600; font-size: 0.92rem;
      letter-spacing: -0.005em;
    }
    .step-status {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.74rem; color: var(--muted);
      margin-top: 0.1rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .step.s-pass .step-bullet  { background: var(--ok-soft); color: var(--ok); border-color: var(--ok-soft); }
    .step.s-pass .step-status  { color: var(--ok); }
    .step.s-warn .step-bullet  { background: var(--warn-soft); color: var(--warn); border-color: var(--warn-soft); }
    .step.s-warn .step-status  { color: var(--warn); }
    .step.s-fail .step-bullet  { background: var(--fail-soft); color: var(--fail); border-color: var(--fail-soft); }
    .step.s-fail .step-status  { color: var(--fail); }
    .step.s-run  .step-bullet  {
      background: var(--accent-soft); color: var(--accent); border-color: var(--accent);
      animation: bullet-pulse 1.6s infinite;
    }
    .step.s-run  .step-status  { color: var(--accent); }
    @keyframes bullet-pulse {
      0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
      50%     { box-shadow: 0 0 0 5px rgba(176,74,47,0); }
    }
    .step.optional .step-name { color: var(--muted); font-style: italic; }
    .step.optional .step-bullet { border: 2px dashed var(--rule); background: transparent; }

    .panel {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(26,26,26,0.03);
      overflow: hidden;
    }
    .panel-head {
      padding: 1.05rem 1.3rem;
      border-bottom: 1px solid var(--rule);
      display: flex; align-items: center; gap: 1rem;
      flex-wrap: wrap;
    }
    .panel-eyebrow {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent);
    }
    .panel-title {
      font-family: "Source Serif 4", serif;
      font-size: 1.22rem; font-weight: 700;
      letter-spacing: -0.012em;
      margin-top: 0.15rem;
    }
    .panel-sub { font-size: 0.85rem; color: var(--muted); margin-top: 0.1rem; }
    .panel-actions { margin-left: auto; display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .panel-body { padding: 1.2rem 1.3rem; }

    .artifact-list {
      border: 1px solid var(--rule);
      border-radius: 10px;
      overflow: hidden;
    }
    .artifact-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.8rem;
      padding: 0.7rem 0.95rem;
      border-bottom: 1px solid var(--rule-soft);
      align-items: center;
      font-size: 0.88rem;
    }
    .artifact-row:last-child { border-bottom: none; }
    .artifact-row:hover { background: var(--rule-soft); }
    .artifact-row .a-tag {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem; font-weight: 600;
      padding: 0.16rem 0.5rem;
      border-radius: 6px;
      background: var(--rule-soft); color: var(--ink-soft);
      white-space: nowrap;
    }
    .artifact-row .a-tag.get  { background: #e0eaf1; color: #1a4a7a; }
    .artifact-row .a-tag.post { background: var(--ok-soft); color: var(--ok); }
    .artifact-row .a-tag.put  { background: var(--warn-soft); color: var(--warn); }
    .artifact-row .a-tag.delete { background: var(--fail-soft); color: var(--fail); }
    .artifact-row .a-name { font-weight: 600; word-break: break-all; }
    .artifact-row .a-desc { color: var(--muted); font-weight: 400; font-size: 0.84rem; }
    .artifact-row .a-action {
      font-size: 0.78rem; color: var(--accent); font-weight: 600;
      cursor: pointer; white-space: nowrap;
      background: none; border: none; padding: 0;
    }
    .artifact-row .a-action:hover { text-decoration: underline; }
    .artifact-row .a-actions { display: flex; gap: 0.5rem; align-items: center; }

    .card {
      border: 1px solid var(--rule);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.6rem;
      background: var(--paper);
      transition: border-color .15s, box-shadow .15s;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(176,74,47,0.06);
    }
    .card-head {
      display: flex; align-items: center; gap: 0.6rem;
      flex-wrap: wrap; margin-bottom: 0.3rem;
    }
    .card-id {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.74rem; color: var(--muted);
      cursor: pointer;
    }
    .card-id:hover { color: var(--accent); }
    .card-title {
      font-weight: 600; font-size: 0.96rem;
      flex: 1; min-width: 0;
    }
    .card-desc {
      font-size: 0.86rem; color: var(--muted);
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }
    .card-meta { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.5rem; }
    .card-actions { display: flex; gap: 0.3rem; flex-wrap: wrap; padding-top: 0.4rem; border-top: 1px dashed var(--rule); }

    .chip {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.7rem; font-weight: 600;
      padding: 0.18rem 0.5rem;
      border-radius: 999px;
      background: var(--rule-soft); color: var(--ink-soft);
      white-space: nowrap;
    }
    .chip.ok    { background: var(--ok-soft); color: var(--ok); }
    .chip.warn  { background: var(--warn-soft); color: var(--warn); }
    .chip.fail  { background: var(--fail-soft); color: var(--fail); }
    .chip.accent{ background: var(--accent-soft); color: var(--accent); }
    .chip.diff  { background: #e0eaf1; color: #1a4a7a; }
    .chip.idle  { background: var(--idle-soft); color: var(--idle); }
    .chip.running { background: var(--accent-soft); color: var(--accent); animation: chip-pulse 1.4s infinite; }
    @keyframes chip-pulse {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.65; }
    }

    .empty {
      padding: 2.2rem 1rem;
      text-align: center; color: var(--muted);
      border: 1px dashed var(--rule); border-radius: 10px;
      background: var(--paper-2);
    }
    .empty .empty-icon {
      font-family: "JetBrains Mono", monospace;
      font-size: 1.6rem; color: var(--muted-2);
      margin-bottom: 0.4rem;
    }
    .empty p { margin-bottom: 0.6rem; }
    .empty .empty-cmd {
      display: inline-block;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.82rem;
      background: var(--code-bg);
      padding: 0.4rem 0.7rem;
      border-radius: 6px;
      color: var(--ink-soft);
    }

    .modal-back {
      position: fixed; inset: 0;
      background: rgba(26,26,26,0.55);
      display: none;
      align-items: center; justify-content: center;
      z-index: 100; padding: 1.5rem;
    }
    .modal-back.show { display: flex; animation: fade-in .15s ease-out; }
    .modal {
      background: var(--paper);
      border-radius: 14px;
      max-width: 880px; width: 100%;
      max-height: 86vh;
      overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 22px 60px rgba(0,0,0,0.25);
    }
    .modal.lg { max-width: 1140px; }
    .modal.sm { max-width: 540px; }
    .modal-head {
      padding: 1.05rem 1.2rem;
      border-bottom: 1px solid var(--rule);
      display: flex; align-items: center; gap: 1rem;
    }
    .modal-title {
      font-family: "Source Serif 4", serif;
      font-size: 1.1rem; font-weight: 700;
      word-break: break-word;
    }
    .modal-sub {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem; color: var(--muted);
      word-break: break-all;
    }
    .modal-body { padding: 1.1rem 1.2rem; overflow-y: auto; flex: 1; }
    .modal-foot {
      padding: 0.85rem 1.2rem;
      border-top: 1px solid var(--rule);
      display: flex; justify-content: flex-end; gap: 0.5rem;
      background: var(--paper-2);
    }
    .modal-close {
      margin-left: auto;
      border: none; background: transparent;
      cursor: pointer; color: var(--muted);
      font-size: 1.2rem; padding: 0.2rem 0.5rem;
      border-radius: 6px;
    }
    .modal-close:hover { background: var(--rule-soft); color: var(--ink); }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .code, .term {
      background: #1a1a1a; color: #e8e6e0;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem; line-height: 1.6;
      overflow: auto;
      max-height: 60vh;
    }
    .code { white-space: pre; }
    .term { white-space: pre-wrap; word-break: break-word; }

    .markdown {
      background: var(--paper-2);
      border: 1px solid var(--rule);
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      font-size: 0.92rem; line-height: 1.65;
      max-height: 60vh; overflow-y: auto;
    }
    .markdown h1, .markdown h2, .markdown h3, .markdown h4 {
      font-family: "Source Serif 4", serif; font-weight: 700;
      letter-spacing: -0.005em; margin: 0.7em 0 0.35em;
    }
    .markdown h1 { font-size: 1.3rem; }
    .markdown h2 { font-size: 1.15rem; }
    .markdown h3 { font-size: 1.02rem; }
    .markdown h4 { font-size: 0.95rem; }
    .markdown p  { margin-bottom: 0.5em; color: var(--ink-soft); }
    .markdown ul, .markdown ol { padding-left: 1.4em; margin-bottom: 0.5em; }
    .markdown li { margin-bottom: 0.18em; color: var(--ink-soft); }
    .markdown code {
      background: var(--code-bg); padding: 0.05em 0.32em;
      border-radius: 4px; font-size: 0.86em; color: var(--ink-soft);
    }
    .markdown pre {
      background: #1a1a1a; color: #e8e6e0;
      padding: 0.7rem 0.9rem; border-radius: 8px;
      overflow-x: auto; font-size: 0.82em; margin: 0.5em 0;
    }
    .markdown pre code { background: transparent; color: inherit; padding: 0; }
    .markdown a { color: var(--link); }
    .markdown blockquote {
      border-left: 3px solid var(--accent); padding-left: 0.8rem;
      margin: 0.6em 0; color: var(--muted); font-style: italic;
    }
    .markdown hr { border: none; border-top: 1px solid var(--rule); margin: 0.8em 0; }
    .markdown strong { font-weight: 700; color: var(--ink); }
    .markdown em { font-style: italic; }
    .markdown table { border-collapse: collapse; width: 100%; margin: 0.5em 0; font-size: 0.88em; }
    .markdown th, .markdown td { padding: 0.35em 0.6em; border: 1px solid var(--rule); text-align: left; }
    .markdown th { background: var(--rule-soft); font-weight: 600; }

    .skel {
      background: linear-gradient(90deg, var(--rule-soft) 0%, var(--paper-2) 50%, var(--rule-soft) 100%);
      background-size: 200% 100%;
      animation: skel-shimmer 1.4s ease-in-out infinite;
      border-radius: 6px; height: 14px;
    }
    @keyframes skel-shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .progress {
      height: 6px; border-radius: 99px;
      background: var(--rule-soft); overflow: hidden;
      margin: 0.4rem 0 0.6rem; position: relative;
    }
    .progress > span {
      display: block; height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width .4s ease;
    }
    .progress.indet > span {
      width: 35% !important; position: absolute;
      animation: indet-slide 1.6s ease-in-out infinite;
    }
    @keyframes indet-slide {
      0%   { left: -35%; }
      100% { left: 105%; }
    }

    .tree {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.82rem; line-height: 1.7;
      background: var(--paper-2);
      border: 1px solid var(--rule); border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--ink-soft);
    }
    .tree .file { color: var(--ink); cursor: pointer; }
    .tree .file:hover { color: var(--accent); text-decoration: underline; }
    .tree .dir  { color: var(--accent); font-weight: 600; }
    .tree .size { color: var(--muted-2); font-size: 0.78rem; margin-left: 0.5em; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--ink); color: #fff;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 200;
      transform: translateY(60px); opacity: 0;
      transition: transform .25s, opacity .25s;
      max-width: 480px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.ok    { background: var(--ok); }
    .toast.fail  { background: var(--fail); }
    .toast.accent { background: var(--accent); }

    footer {
      border-top: 1px solid var(--rule);
      padding: 1.1rem 1.5rem;
      text-align: center;
      color: var(--muted); font-size: 0.8rem;
    }
    .v-tag {
      display: inline-block;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.18rem 0.55rem; border-radius: 999px;
      margin-right: 0.55rem;
    }

    .row { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
    .grow { flex: 1; min-width: 0; }
    .stack { display: flex; flex-direction: column; gap: 0.7rem; }
    .stack-tight { display: flex; flex-direction: column; gap: 0.3rem; }
    .muted { color: var(--muted); }
    .label-mono {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.74rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
    }

    .kpi-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem; margin-bottom: 1rem;
    }
    @media (max-width: 720px) { .kpi-row { grid-template-columns: 1fr 1fr; } }
    .kpi {
      background: var(--paper-2);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
    }
    .kpi-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted);
    }
    .kpi-value {
      font-family: "Source Serif 4", serif;
      font-size: 1.4rem; font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink); margin-top: 0.1rem;
    }

    .filter-row {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      margin-bottom: 0.9rem; align-items: center;
    }
    .filter-row input, .filter-row select { font-size: 0.85rem; padding: 0.35rem 0.55rem; }
    .filter-row .grow { min-width: 200px; }

    /* trajectory list — focus-on-active style (matches classic dashboard) */
    .trajectory-list {
      display: flex; flex-direction: column; gap: 0;
    }
    .trajectory-step {
      display: grid;
      grid-template-columns: minmax(160px, 0.52fr) minmax(0, 0.7fr);
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--rule);
      background: transparent;
      opacity: 0.72;
      transition: background .2s ease, grid-template-columns .28s ease, gap .28s ease, padding .28s ease, opacity .28s ease;
    }
    .trajectory-step.active {
      grid-template-columns: minmax(260px, 0.95fr) minmax(0, 1.7fr);
      gap: 18px;
      padding: 14px 0;
      background: linear-gradient(90deg, rgba(176, 74, 47, 0.05), transparent 45%);
      opacity: 1;
    }
    .trajectory-step-text { min-width: 0; display: flex; flex-direction: column; }
    .trajectory-step-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 4px; }
    .step-num {
      font-family: "JetBrains Mono", monospace;
      font-weight: 700; color: var(--accent);
      flex-shrink: 0; font-size: 10px;
      letter-spacing: 0.02em;
      transition: font-size .28s ease;
    }
    .trajectory-step.active .step-num { font-size: 12px; }
    .trajectory-step-reasoning {
      padding: 0; font-size: 10px;
      line-height: 1.32; margin-bottom: 5px;
      white-space: pre-wrap; word-break: break-word;
      color: var(--ink);
      transition: font-size .28s ease, line-height .28s ease, margin-bottom .28s ease;
    }
    .trajectory-step.active .trajectory-step-reasoning {
      font-size: 12px; line-height: 1.45; margin-bottom: 8px;
    }
    .trajectory-step-reasoning-label, .step-actions-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted);
      margin-bottom: 2px; font-weight: 600;
      transition: font-size .28s ease, margin-bottom .28s ease;
    }
    .trajectory-step.active .trajectory-step-reasoning-label,
    .trajectory-step.active .step-actions-label {
      font-size: 11px; margin-bottom: 3px;
    }
    .trajectory-step-media {
      display: flex; align-items: center; justify-content: center;
      min-width: 0;
    }
    .trajectory-step-media-frame {
      width: 100%;
      max-width: 320px;
      height: clamp(72px, 10vw, 118px);
      padding: 2px;
      border-radius: 10px;
      background: transparent;
      opacity: 0.42;
      transition: box-shadow .25s ease, opacity .25s ease, background .25s ease, max-width .28s ease, height .28s ease, padding .28s ease;
    }
    .trajectory-step.active .trajectory-step-media-frame {
      max-width: 840px;
      height: clamp(240px, 38vw, 460px);
      padding: 6px;
      box-shadow: 0 14px 34px rgba(176, 74, 47, 0.20);
      opacity: 1;
      background: rgba(176, 74, 47, 0.04);
    }
    .trajectory-step-media-frame.placeholder {
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 13px;
      border: 1px dashed var(--rule);
    }
    .trajectory-step-image {
      display: block;
      width: 100%; height: 100%;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid rgba(31, 35, 40, 0.08);
      background: var(--paper);
      cursor: pointer;
      transform: scale(0.46);
      filter: saturate(0.72);
      transition: transform .3s ease, border-color .2s ease, filter .3s ease;
    }
    .trajectory-step.active .trajectory-step-image {
      border-color: var(--accent);
      transform: scale(1);
      filter: saturate(1);
    }
    .trajectory-step-image:hover { border-color: var(--accent); }

    .step-action-code {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      background: transparent;
      padding: 2px 0;
      border-radius: 4px;
      margin-bottom: 2px;
      border: none;
      color: var(--muted);
      transition: font-size .28s ease;
      word-break: break-word;
    }
    .step-action-result {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
      transition: font-size .28s ease;
      word-break: break-word;
    }
    .step-action-result.fail { color: var(--fail); }
    .trajectory-step.active .step-action-code,
    .trajectory-step.active .step-action-result { font-size: 12px; }

    @media (max-width: 900px) {
      .trajectory-step { grid-template-columns: 1fr; gap: 6px; padding: 6px 0; opacity: 0.82; }
      .trajectory-step.active { gap: 10px; padding: 10px 0; }
      .trajectory-step-head { flex-direction: column; }
      .trajectory-step-media-frame { max-width: 100%; height: clamp(88px, 22vw, 140px); opacity: 1; }
      .trajectory-step.active .trajectory-step-media-frame { height: clamp(220px, 72vw, 360px); }
    }
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      display: none; align-items: center; justify-content: center;
      z-index: 250; cursor: zoom-out;
      padding: 1rem;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 100%; max-height: 100%; }

    /* judge result */
    .judge-row {
      display: grid; grid-template-columns: auto 1fr auto;
      gap: 0.6rem; align-items: start;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--rule-soft);
    }
    .judge-row:last-child { border-bottom: none; }
    .judge-row .jr-name { font-weight: 600; font-size: 0.88rem; }
    .judge-row .jr-reason { color: var(--muted); font-size: 0.84rem; }

    /* form layout */
    .form-row { margin-bottom: 0.8rem; }
    .form-row.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
    .form-row .help { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }
    .form-check {
      display: inline-flex; align-items: center; gap: 0.4rem;
      cursor: pointer;
      font-size: 0.86rem;
    }
    .form-check input { width: auto; margin: 0; }

    /* trace events */
    .trace-events { max-height: 320px; overflow-y: auto; padding-right: 0.4rem; }
    .trace-event {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem;
      padding: 0.32rem 0.6rem;
      border-bottom: 1px dashed var(--rule-soft);
      display: flex; gap: 0.55rem;
      color: var(--ink-soft);
    }
    .trace-event .te-tag {
      flex-shrink: 0;
      font-weight: 700; font-size: 0.68rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.05rem 0.4rem; border-radius: 4px;
      background: var(--rule-soft); color: var(--ink-soft);
      align-self: flex-start;
    }
    .trace-event.tool .te-tag    { background: #e0eaf1; color: #1a4a7a; }
    .trace-event.text .te-tag    { background: var(--idle-soft); color: var(--idle); }
    .trace-event.thinking .te-tag{ background: #e7dee9; color: #5a2a7a; }
    .trace-event.result .te-tag  { background: var(--ok-soft); color: var(--ok); }
    .trace-event.error .te-tag, .trace-event.fail .te-tag { background: var(--fail-soft); color: var(--fail); }
    .trace-event .te-msg { flex: 1; min-width: 0; word-break: break-word; }

    .diff-box { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    @media (max-width: 720px) { .diff-box { grid-template-columns: 1fr; } }
    .diff-side {
      border: 1px solid var(--rule); border-radius: 8px; overflow: hidden;
    }
    .diff-side h5 {
      background: var(--rule-soft); padding: 0.4rem 0.7rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink-soft);
    }
    .diff-side .code {
      max-height: 280px; border-radius: 0;
      font-size: 0.74rem;
    }

    /* small "running" badge inline */
    .run-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.74rem; font-weight: 600;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      background: var(--accent-soft); color: var(--accent);
    }
    .run-badge::before {
      content: ""; display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: ai-pulse 1.4s infinite;
    }

    /* benchmark summary table */
    .summary-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.86rem;
      border: 1px solid var(--rule); border-radius: 10px; overflow: hidden;
    }
    .summary-table thead th {
      text-align: left;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted-2);
      padding: 0.65rem 0.85rem;
      background: var(--paper-2);
      border-bottom: 1px solid var(--rule);
    }
    .summary-table thead th.right { text-align: right; }
    .summary-table tbody td {
      padding: 0.6rem 0.85rem;
      border-bottom: 1px solid var(--rule-soft);
      vertical-align: middle;
    }
    .summary-table tbody tr:last-child td { border-bottom: none; }
    .summary-table tbody tr { cursor: pointer; transition: background .12s; }
    .summary-table tbody tr:hover { background: var(--rule-soft); }
    .summary-table .right { text-align: right; font-family: "JetBrains Mono", monospace; }
    .summary-table .pct-bar {
      display: inline-block; vertical-align: middle;
      width: 60px; height: 5px; border-radius: 99px;
      background: var(--rule-soft); margin-right: 0.4rem;
      overflow: hidden;
    }
    .summary-table .pct-bar > span {
      display: block; height: 100%;
      background: var(--accent); border-radius: 99px;
    }
    .summary-table .pct-bar.ok > span { background: var(--ok); }
    .summary-table .pct-bar.warn > span { background: var(--warn); }
    .summary-table .pct-bar.fail > span { background: var(--fail); }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="logo"><img src="/static/opencomputer.svg" alt="OpenComputer" /></span>
        OpenComputer
        <span class="brand-sub">Dashboard</span>
      </div>
      <nav class="section-tabs">
        <button class="section-tab" id="tab-synthetic" onclick="switchSection('synthetic')">Synthetic</button>
        <button class="section-tab" id="tab-benchmark" onclick="switchSection('benchmark')">Benchmark</button>
      </nav>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <a class="btn ghost sm" href="/">
          <svg viewBox="0 0 24 24"><path d="M9 18l-6-6 6-6"/></svg>
          Classic
        </a>
        <button class="btn sm" id="refresh-btn" title="Refresh data">
          <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
          Refresh
        </button>
      </div>
    </div>
  </div>

  <div class="shell">

    <aside class="sidebar">
      <div class="sidebar-section" id="benchmark-side" style="display:none;">
        <h3>Overview</h3>
        <ul class="app-list">
          <li class="app-item" id="overview-item" onclick="state.currentApp=null;renderSidebar();renderMain();">
            <span class="ai-icon" style="background:#1a1a1a;color:#fff;">≡</span>
            <span class="ai-name">Cross-app summary</span>
          </li>
        </ul>
      </div>
      <div class="sidebar-section">
        <h3>Apps <span class="count" id="app-count">—</span></h3>
        <button class="add-app" id="add-app-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          New app
        </button>
        <div class="add-app-inline" id="add-app-inline" style="display:none;margin-bottom:0.5rem">
          <input type="text" id="add-app-inline-name" placeholder="app_name" autocomplete="off"
                 style="display:block;width:100%;padding:0.4rem 0.55rem;font-size:0.84rem;border:1px solid var(--accent);border-radius:8px;background:var(--paper);color:var(--ink);font-family:inherit" />
          <div id="add-app-inline-err" style="color:var(--fail);font-size:0.75rem;margin-top:3px;display:none"></div>
        </div>
        <input type="search" class="sidebar-search" id="app-search" placeholder="Filter apps…" />
        <ul class="app-list" id="app-list">
          <li class="sidebar-empty">loading…</li>
        </ul>
      </div>
    </aside>

    <main class="main" id="main">
      <div class="empty"><div class="empty-icon">∅</div><p>Loading apps…</p></div>
    </main>
  </div>

  <div class="modal-back" id="modal-back">
    <div class="modal" id="modal">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="modal-title">Title</div>
          <div class="modal-sub" id="modal-sub"></div>
        </div>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-foot" id="modal-foot" style="display:none;"></div>
    </div>
  </div>

  <div class="lightbox" id="lightbox"><img id="lightbox-img" src="" /></div>

  <div class="toast" id="toast"><span id="toast-msg">message</span></div>

  <footer>
    <span class="v-tag">v2</span>
    Same pipeline, redesigned. Switch to <a href="/">classic</a> for legacy views.
  </footer>

  <script>
  // ============================================================
  // STATE
  // ============================================================
  const state = {
    verifiers: [], smokeApps: [], smokeRuns: [], apps: {},
    appNames: [], filteredAppNames: [], appsTasks: {},
    runs: [], models: [],
    section: 'synthetic',           // 'synthetic' | 'benchmark'
    currentApp: null, currentStage: 'verifier',
    appSearch: '', taskSearch: '', taskDifficulty: '',
    benchmarkRunFilter: '',         // run_id or '' for latest-per-task
    benchmarkAppFilter: '',
    benchmarkSearch: '', benchmarkDifficulty: '',
    benchmarkSummary: null, benchmarkTasks: [],
    pollers: {},
    runningTasks: {},
    pendingProposal: null,
    pendingGen: null,
  };
  const STAGES = ['verifier', 'smoke', 'tasks', 'repair'];
  const STAGE_META = {
    verifier: { num: '01', label: 'Verifier', sub: 'Endpoints + tests' },
    smoke:    { num: '02', label: 'Smoke',    sub: 'Live sandbox runs' },
    tasks:    { num: '03', label: 'Tasks',    sub: 'Generate · run · judge' },
    repair:   { num: '04', label: 'Repair',   sub: 'Optional repair runs', optional: true },
  };
  const APP_PALETTE = [
    ['#eadfd1', '#7a4a1a'], ['#d8e4ea', '#1a4f7a'], ['#e7dee9', '#5a2a7a'],
    ['#dde6dd', '#2a5a2a'], ['#ead8d8', '#7a1a1a'], ['#e1e1de', '#3a3a3a'],
    ['#e6e0d2', '#6a5a1a'], ['#d8e4e4', '#1a5a5a'], ['#ead7e0', '#7a2a4a'],
  ];

  // ============================================================
  // FETCH
  // ============================================================
  async function fetchJSON(url, opts) {
    const r = await fetch(url, opts);
    const ct = r.headers.get('content-type') || '';
    if (!r.ok) {
      let msg = `${url} → ${r.status}`;
      try {
        if (ct.includes('json')) { const j = await r.json(); if (j.error) msg = j.error; }
        else { const t = await r.text(); if (t) msg = t; }
      } catch {}
      throw new Error(msg);
    }
    return r.json();
  }
  async function fetchText(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`${url} → ${r.status}`);
    return r.text();
  }
  async function postJSON(url, body) {
    return fetchJSON(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body || {}),
    });
  }
  async function deleteJSON(url) {
    return fetchJSON(url, { method: 'DELETE' });
  }

  // ============================================================
  // POLLING
  // ============================================================
  function startPoll(key, fn, interval = 1500) {
    stopPoll(key);
    const tick = async () => { try { await fn(); } catch (e) { console.warn(key, e); } };
    state.pollers[key] = setInterval(tick, interval);
    tick();
  }
  function stopPoll(key) {
    if (state.pollers[key]) { clearInterval(state.pollers[key]); delete state.pollers[key]; }
  }
  function stopAllPolls() { for (const k of Object.keys(state.pollers)) stopPoll(k); }

  // ============================================================
  // BOOT
  // ============================================================
  async function loadAll() {
    try {
      const [verifiers, smokeApps, smokeRuns, models, runs] = await Promise.all([
        fetchJSON('/api/synthesis/verifiers').catch(() => []),
        fetchJSON('/api/synthesis/smoke/apps').catch(() => []),
        fetchJSON('/api/synthesis/smoke/runs').catch(() => []),
        fetchJSON('/api/models').catch(() => ['kimi-k2.5','claude-sonnet-4-6','claude-opus-4-6']),
        fetchJSON('/api/runs').catch(() => []),
      ]);
      state.verifiers = verifiers; state.smokeApps = smokeApps;
      state.smokeRuns = smokeRuns; state.models = models;
      state.runs = runs;
      const tasks = await fetchJSON('/api/tasks').catch(() => []);
      const byApp = {};
      for (const t of tasks) (byApp[t.app] = byApp[t.app] || []).push(t);
      state.appsTasks = byApp;
      buildAppIndex(); computeAppStatuses(); applyAppSearch();
      if (!state.currentApp && state.filteredAppNames.length) {
        state.currentApp = state.filteredAppNames[0];
      }
      renderSidebar(); renderMain();
    } catch (e) {
      console.error(e);
      $('main').innerHTML = `<div class="empty"><div class="empty-icon">!</div><p>Failed to load: ${escapeHtml(e.message)}</p><button class="btn" onclick="location.reload()">Reload</button></div>`;
    }
  }
  function buildAppIndex() {
    const names = new Set();
    state.verifiers.forEach(v => names.add(v.app));
    state.smokeApps.forEach(s => names.add(s.app));
    Object.keys(state.appsTasks).forEach(a => names.add(a));
    const sorted = Array.from(names).filter(Boolean).sort();
    state.appNames = sorted;
    sorted.forEach((name, i) => {
      const [bg, fg] = APP_PALETTE[i % APP_PALETTE.length];
      state.apps[name] = state.apps[name] || {};
      state.apps[name].name = name;
      state.apps[name].label = (name[0]?.toUpperCase() || '') + (name[1] || '');
      state.apps[name].color = bg;
      state.apps[name].text = fg;
    });
  }
  function computeAppStatuses() {
    for (const name of state.appNames) {
      const a = state.apps[name];
      const v = state.verifiers.find(x => x.app === name);
      const s = state.smokeApps.find(x => x.app === name);
      const tasks = state.appsTasks[name] || [];
      if (v) {
        if (v.has_verifier && v.has_test_py && v.has_readme) a.verifier = { status: 'pass', meta: v };
        else if (v.has_verifier) a.verifier = { status: 'warn', meta: v };
        else a.verifier = { status: 'idle', meta: v };
      } else a.verifier = { status: 'idle', meta: null };
      if (s && s.total > 0) {
        if (s.errored > 0) a.smoke = { status: 'fail', meta: s };
        else if (s.solved === s.total) a.smoke = { status: 'pass', meta: s };
        else if (s.solved > 0) a.smoke = { status: 'warn', meta: s };
        else a.smoke = { status: 'idle', meta: s };
      } else a.smoke = { status: 'idle', meta: s || null };
      const finalized = tasks.filter(t => t.has_env || (t.num_checks || 0) > 0);
      if (tasks.length === 0) a.tasks = { status: 'idle', meta: { count: 0, finalized: 0 } };
      else if (finalized.length >= 3) a.tasks = { status: 'pass', meta: { count: tasks.length, finalized: finalized.length } };
      else a.tasks = { status: 'warn', meta: { count: tasks.length, finalized: finalized.length } };
      let repairTotal = 0, repairSolved = 0;
      for (const t of tasks) {
        const rbm = t.runs_by_model || {};
        for (const k of Object.keys(rbm)) {
          if (k.startsWith('repair:')) { repairTotal++; if (rbm[k].reward === 1) repairSolved++; }
        }
      }
      if (!repairTotal) a.repair = { status: 'idle', meta: { runs: 0 } };
      else if (repairSolved === repairTotal) a.repair = { status: 'pass', meta: { runs: repairTotal, solved: repairSolved } };
      else a.repair = { status: 'warn', meta: { runs: repairTotal, solved: repairSolved } };
    }
  }
  function appOverall(a) {
    if (a.smoke?.status === 'fail') return 'fail';
    if (a.verifier?.status === 'pass' && a.smoke?.status === 'pass' && a.tasks?.status === 'pass') return 'pass';
    if (a.verifier?.status === 'warn' || a.tasks?.status === 'warn' || a.smoke?.status === 'warn') return 'warn';
    if (a.verifier?.status === 'pass') return 'idle';
    return 'idle';
  }
  function applyAppSearch() {
    const q = state.appSearch.toLowerCase();
    state.filteredAppNames = q ? state.appNames.filter(n => n.toLowerCase().includes(q)) : state.appNames;
  }

  // ============================================================
  // RENDER: sidebar + main shell
  // ============================================================
  const $ = (id) => document.getElementById(id);

  function renderSidebar() {
    // Section tabs (top of page)
    $('tab-synthetic').classList.toggle('active', state.section === 'synthetic');
    $('tab-benchmark').classList.toggle('active', state.section === 'benchmark');

    // Show "Cross-app summary" only in benchmark mode
    const benchSide = $('benchmark-side');
    if (benchSide) benchSide.style.display = state.section === 'benchmark' ? '' : 'none';
    const overviewItem = $('overview-item');
    if (overviewItem) overviewItem.classList.toggle('active', state.section === 'benchmark' && !state.currentApp);

    // Apps section
    $('app-count').textContent = state.filteredAppNames.length;
    const ul = $('app-list'); ul.innerHTML = '';
    if (state.filteredAppNames.length === 0) {
      ul.innerHTML = `<li class="sidebar-empty">${state.appSearch ? 'No matches' : 'No apps yet — click <strong>+ New app</strong> below.'}</li>`;
      return;
    }
    state.filteredAppNames.forEach(name => {
      const a = state.apps[name];
      const overall = appOverall(a);
      const li = document.createElement('li');
      li.className = 'app-item' + (name === state.currentApp ? ' active' : '');
      li.innerHTML = `
        <span class="ai-icon" style="background:${a.color};color:${a.text};">${a.label}</span>
        <span class="ai-name">${name}</span>
        <span class="ai-dot ${overall}"></span>
      `;
      li.onclick = () => { state.currentApp = name; state.currentStage = 'verifier'; renderSidebar(); renderMain(); };
      ul.appendChild(li);
    });
  }

  function switchSection(s) {
    state.section = s;
    if (s === 'benchmark') {
      // load benchmark data lazily
      if (!state.benchmarkSummary) loadBenchmark().then(() => { renderSidebar(); renderMain(); });
    }
    renderSidebar();
    renderMain();
  }

  function renderMain() {
    if (state.section === 'benchmark') {
      if (state.currentApp) return renderBenchmarkAppView();
      return renderBenchmarkOverview();
    }
    if (!state.currentApp) {
      $('main').innerHTML = `<div class="empty"><div class="empty-icon">∅</div><p>Pick an app from the sidebar.</p></div>`;
      return;
    }
    const name = state.currentApp;
    const a = state.apps[name];
    const overall = appOverall(a);
    const overallText = ({pass:'all stages green', warn:'attention required', fail:'failure', idle:'not started'})[overall];
    $('main').innerHTML = `
      <div class="app-header">
        <div class="ah-icon" style="background:${a.color};color:${a.text};">${a.label}</div>
        <div>
          <h1>${name}</h1>
          <div class="ah-meta">
            <span class="ai-dot ${overall}" style="display:inline-block;"></span>
            ${overallText}
            <span style="color:var(--rule);">·</span>
            verifiers/${name}
          </div>
        </div>
        <div class="app-header-actions" id="app-header-actions"></div>
      </div>
      <div class="stepper"><div class="stepper-row" id="stepper">${renderStepper(a)}</div></div>
      <div class="panel">
        <div class="panel-head" id="panel-head"></div>
        <div class="panel-body" id="panel-body"></div>
      </div>
    `;
    renderHeaderActions();
    renderDetail();
  }

  function renderHeaderActions() {
    const a = state.apps[state.currentApp];
    const v = a.verifier?.meta;
    const acts = [];
    if (v?.has_readme)   acts.push(`<button class="btn ghost sm" onclick="openReadme('${state.currentApp}')">README.md</button>`);
    if (v?.has_test_md)  acts.push(`<button class="btn ghost sm" onclick="openTestMd('${state.currentApp}')">Test.md</button>`);
    if (v?.has_verifier) acts.push(`<button class="btn ghost sm" onclick="openVerifierSource('${state.currentApp}')">${state.currentApp}.py</button>`);
    $('app-header-actions').innerHTML = acts.join('');
  }

  function renderStepper(a) {
    return STAGES.map(s => {
      const m = STAGE_META[s];
      const stage = a[s] || { status: 'idle' };
      const cls = ['step', 's-' + stage.status];
      if (s === state.currentStage) cls.push('selected');
      if (m.optional) cls.push('optional');
      const bullet = ({pass:'✓', warn:'!', fail:'×', run:'…', idle:m.num})[stage.status];
      return `
        <div class="${cls.join(' ')}" onclick="selectStage('${s}')">
          <div class="step-bullet">${bullet}</div>
          <div class="step-body">
            <div class="step-name">${m.label}${m.optional?' <span class="muted" style="font-size:0.74rem;">(opt)</span>':''}</div>
            <div class="step-status">${stepStatusLabel(s, stage)}</div>
          </div>
        </div>`;
    }).join('');
  }
  function stepStatusLabel(s, stage) {
    if (s === 'verifier') {
      const v = stage.meta;
      if (!v) return 'no verifier';
      return `${v.endpoint_count || 0} endpoints`;
    }
    if (s === 'smoke') {
      const sm = stage.meta;
      if (!sm) return 'not run';
      return `${sm.solved || 0} / ${sm.total || 0} solved`;
    }
    if (s === 'tasks') {
      const t = stage.meta || {};
      return `${t.finalized || 0} / ${t.count || 0} finalized`;
    }
    if (s === 'repair') {
      const r = stage.meta || {};
      if (!r.runs) return 'no runs';
      return `${r.solved || 0} / ${r.runs} solved`;
    }
    return STAGE_META[s].sub;
  }

  function selectStage(s) { state.currentStage = s; renderMain(); }

  function renderDetail() {
    if (state.currentStage === 'verifier') return renderVerifierStage();
    if (state.currentStage === 'smoke')    return renderSmokeStage();
    if (state.currentStage === 'tasks')    return renderTasksStage();
    if (state.currentStage === 'repair')   return renderRepairStage();
  }

  // ============================================================
  // STAGE 1 — VERIFIER
  // ============================================================
  async function renderVerifierStage() {
    const name = state.currentApp;
    const a = state.apps[name];
    const v = a.verifier?.meta;
    const isRunning = state.pollers[`vt:${name}`] || state.pollers[`vg:${name}`];
    $('panel-head').innerHTML = `
      <div>
        <div class="panel-eyebrow">Stage 01 · Verifier</div>
        <div class="panel-title">Endpoints + module files</div>
        <div class="panel-sub">verifiers/${name}/${name}.py</div>
      </div>
      <div class="panel-actions">
        ${v?.has_test_py ? `<button class="btn sm" onclick="runVerifierTest('${name}')" ${isRunning?'disabled':''}>
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg> Run tests
        </button>` : ''}
        <button class="btn sm primary" onclick="generateVerifier('${name}')" ${isRunning?'disabled':''}>
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> ${v?.has_verifier?'Extend':'Generate'}
        </button>
      </div>
    `;
    if (!v || !v.has_verifier) {
      $('panel-body').innerHTML = `
        <div id="vg-status-banner"></div>
        <div class="empty">
          <div class="empty-icon">∅</div>
          <p>No verifier module for <code>${name}</code> yet.</p>
          <button class="btn accent" onclick="generateVerifier('${name}')">Generate verifier</button>
        </div>
      `;
      if (state.pollers[`vg:${name}`]) refreshVerifierGenBanner(name);
      else if (state.lastVgTrace && state.lastVgTrace[name]) paintLastVerifierGenTrace(name);
      return;
    }
    $('panel-body').innerHTML = '<div class="stack"><div class="skel" style="width:60%;"></div><div class="skel" style="width:80%;"></div><div class="skel" style="width:50%;"></div></div>';
    let detail;
    try { detail = await fetchJSON(`/api/synthesis/verifiers/${encodeURIComponent(name)}`); }
    catch (e) { $('panel-body').innerHTML = `<div class="empty"><p>Failed to load: ${escapeHtml(e.message)}</p></div>`; return; }
    const eps = detail.endpoints || [];
    const files = detail.files || [];
    $('panel-body').innerHTML = `
      <div id="vt-status-banner"></div>
      <div id="vg-status-banner"></div>
      <div class="row" style="margin-bottom:0.9rem;">
        <span class="label-mono">${detail.endpoint_count} endpoints</span>
        ${v.has_test_py ? `<span class="chip ok">test_${name}.py</span>` : `<span class="chip warn">no tests</span>`}
        ${v.has_test_md ? `<span class="chip ok">Test.md</span>` : ''}
        ${v.has_readme  ? `<span class="chip ok">README.md</span>` : ''}
      </div>
      ${eps.length ? `
        <div class="artifact-list">
          ${eps.map(e => {
            const obj = (typeof e === 'string') ? { name: e } : e;
            const epName = obj.name || obj.path || '';
            const epDesc = obj.description || obj.desc || '';
            return `
              <div class="artifact-row">
                <span class="a-tag get">${obj.method ? obj.method.toUpperCase() : 'CHECK'}</span>
                <div>
                  <div class="a-name">${escapeHtml(epName)}</div>
                  ${epDesc ? `<div class="a-desc">${escapeHtml(epDesc)}</div>` : ''}
                </div>
                <button class="a-action" onclick="openEndpointSource('${name}', ${JSON.stringify(epName).replace(/"/g,'&quot;')})">view source</button>
              </div>`;
          }).join('')}
        </div>` : `<div class="empty"><p>No endpoints parsed.</p></div>`}
      ${files.length ? `
        <div class="row" style="margin-top:1rem;margin-bottom:0.4rem;">
          <span class="label-mono">${files.length} module file${files.length===1?'':'s'}</span>
        </div>
        <div class="tree">verifiers/${name}/
${files.map(f => `├── <span class="file" onclick="openVerifierFile('${name}','${f.name}')">${f.name}</span><span class="size">${formatBytes(f.size)}</span>`).join('\n')}</div>` : ''}
    `;
    if (state.pollers[`vt:${name}`]) refreshVerifierTestBanner(name);
    if (state.pollers[`vg:${name}`]) refreshVerifierGenBanner(name);
    else if (state.lastVgTrace && state.lastVgTrace[name]) paintLastVerifierGenTrace(name);
  }
  function paintLastVerifierGenTrace(name) {
    const last = state.lastVgTrace && state.lastVgTrace[name];
    const banner = $('vg-status-banner');
    if (!last || !banner) return;
    banner.innerHTML = `
      <div class="card" style="margin-bottom:0.7rem;background:var(--paper-2);">
        <div class="row">
          <span class="label-mono">verifier gen</span>
          <span class="chip ${last.status==='completed'?'ok':last.status==='error'?'fail':'idle'}">${last.status}${last.event_count?` · ${last.event_count} events`:''}</span>
          <span class="grow"></span>
          <button class="btn xs ghost" onclick="delete state.lastVgTrace['${name}'];renderVerifierStage();">dismiss</button>
        </div>
        <div class="trace-events" style="margin-top:0.6rem;">${renderTraceEvents(last.events || [])}</div>
      </div>`;
  }

  // ----- Stage 1 actions -----
  async function runVerifierTest(name) {
    try {
      const r = await postJSON(`/api/synthesis/verifiers/${encodeURIComponent(name)}/test`, {});
      if (r.error) { toast(r.error, 'fail'); return; }
      toast(`Running test_${name}.py …`);
      startPoll(`vt:${name}`, () => refreshVerifierTestBanner(name), 1500);
      renderVerifierStage();
    } catch (e) { toast(e.message, 'fail'); }
  }
  async function refreshVerifierTestBanner(name) {
    try {
      const s = await fetchJSON(`/api/synthesis/verifiers/${encodeURIComponent(name)}/test/status`);
      const banner = $('vt-status-banner');
      if (!banner) return;
      const finished = s.status === 'completed' || s.status === 'error' || s.status === 'idle';
      banner.innerHTML = `
        <div class="card" style="margin-bottom:0.7rem;background:var(--paper-2);">
          <div class="row">
            <span class="label-mono">verifier test</span>
            <span class="chip ${s.status==='completed' && (s.exit_code===0)?'ok':s.status==='error'||(s.exit_code&&s.exit_code!==0)?'fail':'running'}">${s.status}${s.exit_code!=null?` · exit ${s.exit_code}`:''}</span>
            <span class="grow"></span>
            <button class="btn xs ghost" onclick="openProcessOutput('Verifier test · ${name}', ${JSON.stringify(s.output||'').replace(/"/g,'&quot;')})">view output</button>
          </div>
        </div>`;
      if (finished) {
        stopPoll(`vt:${name}`);
        if (s.status === 'completed' && s.exit_code === 0) toast(`Tests passed: ${name}`, 'ok');
        else if (s.status === 'error' || (s.exit_code && s.exit_code !== 0)) toast(`Tests failed: ${name}`, 'fail');
      }
    } catch {}
  }
  function generateVerifier(name) {
    const isNew = !state.apps[name]?.verifier?.meta?.has_verifier;
    openModal(
      `${isNew ? 'Generate' : 'Extend'} verifier · ${name}`,
      isNew ? 'Claude will create the verifier module' : 'Claude will add endpoints to the existing module',
      `
        <div class="form-row">
          <label>Instructions <span class="muted">(optional)</span></label>
          <textarea id="gen-verifier-instr" placeholder="${isNew
            ? 'Describe the app, key surfaces to inspect, important verifier endpoints…'
            : 'What should Claude add or change? Leave empty to let Claude pick gaps to fill.'}" rows="6" style="width:100%;"></textarea>
          <div class="help">Leave empty for defaults. Claude follows <code>verifiers/CLAUDE.md</code>.</div>
        </div>
      `,
      [
        { label: 'Cancel', cls: 'ghost', onclick: 'closeModal()' },
        { label: isNew ? 'Generate' : 'Extend', cls: 'accent primary', onclick: `submitGenerateVerifier('${name}')` },
      ]
    );
    setTimeout(() => {
      const t = $('gen-verifier-instr');
      if (t) t.focus();
    }, 50);
  }
  async function submitGenerateVerifier(name) {
    const t = $('gen-verifier-instr');
    const instructions = t ? (t.value || '').trim() : '';
    closeModal();
    try {
      const r = await postJSON(`/api/synthesis/verifiers/${encodeURIComponent(name)}/generate`, { instructions });
      if (r.error) { toast(r.error, 'fail'); return; }
      toast(`Generating verifier · ${name}`);
      startPoll(`vg:${name}`, () => refreshVerifierGenBanner(name), 1500);
      renderVerifierStage();
    } catch (e) { toast(e.message, 'fail'); }
  }
  async function refreshVerifierGenBanner(name) {
    try {
      const s = await fetchJSON(`/api/synthesis/verifiers/${encodeURIComponent(name)}/generate/status`);
      const banner = $('vg-status-banner');
      if (!banner) return;
      const finished = s.status === 'completed' || s.status === 'error' || s.status === 'idle';
      const traceId = `vg-trace-${name}`;
      const wasAtBottom = (() => {
        const el = $(traceId);
        if (!el) return true;
        return el.scrollHeight - el.scrollTop - el.clientHeight < 20;
      })();
      banner.innerHTML = `
        <div class="card" style="margin-bottom:0.7rem;background:var(--paper-2);">
          <div class="row">
            <span class="label-mono">verifier gen</span>
            <span class="chip ${s.status==='completed'?'ok':s.status==='error'?'fail':'running'}">${s.status}${s.event_count?` · ${s.event_count} events`:''}</span>
            <span class="grow"></span>
            <button class="btn xs ghost" onclick="openTrace('Verifier gen · ${name}', ${JSON.stringify({events:s.events||[],output:s.output||''}).replace(/"/g,'&quot;')})">expand</button>
          </div>
          <div class="trace-events" id="${traceId}" style="margin-top:0.6rem;">${renderTraceEvents(s.events || [])}</div>
        </div>`;
      const traceEl = $(traceId);
      if (traceEl && wasAtBottom) traceEl.scrollTop = traceEl.scrollHeight;
      if (finished) {
        stopPoll(`vg:${name}`);
        toast(`Verifier ${s.status === 'completed' ? 'generated' : 'gen ' + s.status}: ${name}`, s.status === 'completed' ? 'ok' : 'fail');
        // Stash the final trace so it can be re-rendered after the stage refresh
        if (!state.lastVgTrace) state.lastVgTrace = {};
        state.lastVgTrace[name] = {
          events: s.events || [],
          status: s.status,
          exit_code: s.exit_code,
          event_count: s.event_count,
        };
        try {
          state.verifiers = await fetchJSON('/api/synthesis/verifiers');
          buildAppIndex(); computeAppStatuses(); renderSidebar();
          if (state.currentApp === name && state.currentStage === 'verifier') renderVerifierStage();
        } catch {}
      }
    } catch {}
  }

  // ============================================================
  // STAGE 2 — SMOKE
  // ============================================================
  function renderSmokeStage() {
    const name = state.currentApp;
    const a = state.apps[name];
    const sm = a.smoke?.meta;
    const runsForApp = state.smokeRuns.filter(r => r.app === name);
    const isRunning = state.pollers[`sm:${name}`];
    $('panel-head').innerHTML = `
      <div>
        <div class="panel-eyebrow">Stage 02 · Smoke</div>
        <div class="panel-title">Sandbox trajectories per endpoint group</div>
        <div class="panel-sub">smoke/runs/${name}_&lt;ts&gt;/REPORT.md</div>
      </div>
      <div class="panel-actions">
        <button class="btn sm primary" onclick="openSmokeRunForm('${name}')" ${isRunning?'disabled':''}>
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg> Run smoke
        </button>
      </div>
    `;
    let body = `<div id="sm-status-banner"></div>`;
    if (!sm || sm.total === 0) {
      body += `
        <div class="empty">
          <div class="empty-icon">∅</div>
          <p>No smoke runs for <code>${name}</code> yet.</p>
          <div class="empty-cmd">python smoke/smoke_loop.py --app ${name}</div>
        </div>`;
    } else {
      const tasks = sm.tasks || [];
      body += `
        <div class="row" style="margin-bottom:0.5rem;">
          <span class="label-mono">${tasks.length} smoke tasks</span>
          <span class="chip ok">${sm.solved} solved</span>
          ${sm.errored ? `<span class="chip fail">${sm.errored} errored</span>` : ''}
          ${sm.not_run ? `<span class="chip idle">${sm.not_run} not run</span>` : ''}
        </div>
        <div class="artifact-list">
          ${tasks.map(t => `
            <div class="artifact-row">
              <span class="a-tag ${t.status==='solved'?'post':t.status==='errored'?'put':'get'}">${(t.status||'').toUpperCase()}</span>
              <div>
                <div class="a-name">${t.task_id || t.id}</div>
                <div class="a-desc">${t.latest_ts ? 'last run ' + relTime(t.latest_ts) : 'never run'}${t.latest_run_id ? ' · ' + t.latest_run_id : ''}</div>
              </div>
              <button class="a-action" onclick="openSmokeTask('${name}', ${JSON.stringify(t.task_id||t.id).replace(/"/g,'&quot;')})">SOLVED.md</button>
            </div>
          `).join('')}
        </div>`;
      if (runsForApp.length) {
        body += `
          <div class="row" style="margin-top:1.2rem;margin-bottom:0.4rem;">
            <span class="label-mono">${runsForApp.length} run${runsForApp.length===1?'':'s'}</span>
          </div>
          <div class="artifact-list">
            ${runsForApp.map(r => `
              <div class="artifact-row">
                <span class="a-tag get">${r.task_count || 0} TASKS</span>
                <div>
                  <div class="a-name">${r.run_id}</div>
                  <div class="a-desc">${r.timestamp ? relTime(r.timestamp) : ''} · ${r.solved_count || 0} solved${r.has_report ? ' · REPORT.md' : ''}</div>
                </div>
                <button class="a-action" onclick="openSmokeRun('${r.run_id}')">view run</button>
              </div>

  // ============================================================
  // STAGE 3 — TASKS
  // ============================================================
  function renderTasksStage() {

      <div>
        <div class="panel-eyebrow">Stage 03 · Tasks</div>

      </div>
      <div class="panel-actions">
        <button class="btn sm" onclick="openEnvList('${name}')">env files</button>
        <button class="btn sm primary" onclick="openGenerateTasksForm('${name}')">

        </button>
      </div>
    `;

      $('panel-body').innerHTML = `
        <div class="empty">
          <div class="empty-icon">∅</div>
          <p>No tasks for <code>${name}</code>. Generate some to start.</p>
          <button class="btn accent" onclick="openGenerateTasksForm('${name}')">Generate tasks</button>
        </div>`;
      return;
    }
    const finalized = tasks.filter(t => t.has_env || (t.num_checks || 0) > 0);

    const filtered = applyTaskFilters(tasks);
    $('panel-body').innerHTML = `
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">Total</div><div class="kpi-value">${tasks.length}</div></div>
        <div class="kpi"><div class="kpi-label">Finalized</div><div class="kpi-value">${finalized.length}</div></div>
        <div class="kpi"><div class="kpi-label">With env</div><div class="kpi-value">${tasks.filter(t=>t.has_env).length}</div></div>
        <div class="kpi"><div class="kpi-label">Avg checks</div><div class="kpi-value">${(tasks.reduce((s,t)=>s+(t.num_checks||0),0)/tasks.length).toFixed(1)}</div></div>
      </div>
      <div class="filter-row">
        <input type="search" id="task-search" class="grow" placeholder="Search id / description…" value="${escapeHtml(state.taskSearch)}" />
        <select id="task-difficulty">
          <option value="">All difficulties</option>
          ${[1,2,3,4,5].map(d => `<option value="${d}" ${state.taskDifficulty==String(d)?'selected':''}>difficulty ${d}</option>`).join('')}
        </select>
        <span class="label-mono">${filtered.length} of ${tasks.length}</span>
      </div>
      <div class="stack" id="task-list">
        ${filtered.map(taskCardHtml).join('')}
      </div>
    `;
    $('task-search').oninput = (e) => { state.taskSearch = e.target.value; debouncedRenderTasks(); };
    $('task-difficulty').onchange = (e) => { state.taskDifficulty = e.target.value; renderTasksStage(); };
  }
  let taskDebounceTimer;
  function debouncedRenderTasks() {
    clearTimeout(taskDebounceTimer);
    taskDebounceTimer = setTimeout(() => renderTasksStage(), 250);
  }
  function applyTaskFilters(tasks) {
    const q = state.taskSearch.toLowerCase();
    const diff = state.taskDifficulty;
    return tasks.filter(t => {
      if (diff && String(t.metadata?.difficulty || '') !== diff) return false;
      if (q) {
        const hay = `${t.id} ${t.task || ''} ${t.metadata?.description || ''}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }
  function taskCardHtml(t) {
    const running = state.runningTasks[t.id];
    const inBenchmark = state.section === 'benchmark';
    const filterActive = inBenchmark && state.benchmarkRunFilter && state.benchmarkRunFilter !== 'none';
    // When a specific run is filtered, use the server-scoped last_run; otherwise pick best from runs_by_model.
    const primaryRun = filterActive ? t.last_run : bestLastRun(t);
    // Show "View" if any trajectory exists OR if a primary run is known.
    const hasAnyRun = primaryRun || Object.keys(t.runs_by_model || {}).length > 0;
    const idJ = JSON.stringify(t.id).replace(/"/g,'&quot;');
    const runIdJ = primaryRun ? JSON.stringify(primaryRun.run_id||'').replace(/"/g,'&quot;') : '""';
    const subJ = primaryRun ? JSON.stringify(primaryRun.traj_subdir||'').replace(/"/g,'&quot;') : '""';
    const rewardChipCls = primaryRun ? (primaryRun.reward===1?'ok':primaryRun.reward>0?'warn':'fail') : '';
    return `
      <div class="card" id="card-${cssId(t.id)}">
        <div class="card-head">
          <span class="card-id" onclick="openTaskJson(${idJ})">${t.id}</span>
          <span class="card-title">${escapeHtml(t.task || t.metadata?.description || t.id)}</span>
          ${t.metadata?.difficulty ? `<span class="chip">difficulty ${t.metadata.difficulty}</span>` : ''}
          ${inBenchmark && running ? `<span class="run-badge">running · ${running.model}</span>` : ''}
        </div>
        ${t.metadata?.description && t.metadata.description !== t.task ? `<div class="card-desc">${escapeHtml(String(t.metadata.description).slice(0,260))}</div>` : ''}
        <div class="card-meta">
          <span class="chip">${t.num_checks || 0} check${(t.num_checks||0)===1?'':'s'}</span>
          ${t.has_env ? `<span class="chip ok">env</span>` : `<span class="chip warn">no env</span>`}
          ${inBenchmark ? (primaryRun ? `<span class="chip ${rewardChipCls}">${primaryRun.model||'?'}: ${primaryRun.checks_passed||0}/${primaryRun.checks_total||0}${typeof primaryRun.reward==='number'?' · r='+primaryRun.reward.toFixed(2):''}</span>`
            : (filterActive ? `<span class="chip idle">not in this run</span>` : '')) : ''}
          ${inBenchmark && !filterActive ? runsBadge(t) : ''}
        </div>
        <div class="card-actions">
          ${inBenchmark && hasAnyRun ? `<button class="btn xs" onclick="openTrajectory(${idJ}, ${runIdJ}, ${subJ})">View</button>` : ''}
          ${inBenchmark && primaryRun ? `<button class="btn xs" onclick="judgeTask(${idJ}, ${runIdJ}, ${subJ})">Judge</button>` : ''}
          ${inBenchmark ? `<button class="btn xs primary" onclick="openRunTaskForm(${idJ})" ${running?'disabled':''}>Run</button>` : ''}
          <button class="btn xs" onclick="openTaskJson(${idJ})">task.json</button>
          <button class="btn xs ghost" onclick="confirmDeleteTask(${idJ})" style="color:var(--fail);">Delete</button>
        </div>
      </div>`;
  }
  function bestLastRun(t) {
    const rbm = t.runs_by_model || {};
    const entries = Object.values(rbm);
    if (!entries.length) return null;
    const passing = entries.find(e => e.reward === 1);
    return passing || entries.sort((a,b)=> (b.timestamp||'').localeCompare(a.timestamp||''))[0];
  }
  function runsBadge(t) {
    const rbm = t.runs_by_model || {};
    const keys = Object.keys(rbm);
    if (!keys.length) return '';
    const ev = keys.filter(k => k.startsWith('eval:')).length;
    const rp = keys.filter(k => k.startsWith('repair:')).length;
    return [
      ev ? `<span class="chip diff">eval ×${ev}</span>` : '',
      rp ? `<span class="chip accent">repair ×${rp}</span>` : '',

  }
  function cssId(id) { return id.replace(/[^a-zA-Z0-9_-]/g, '_'); }

  // ----- Run a task -----
  function openRunTaskForm(taskId) {

  async function submitRunTask(taskId) {

  async function pollTaskStatus(taskId) {
    try {
      const s = await fetchJSON(`/api/tasks/${encodeURIComponent(taskId)}/status`);

        delete state.runningTasks[taskId];

        toast(`${taskId}: ${s.status}${s.reward!==undefined?` · reward ${s.reward}`:''}${s.error?' · ' + s.error.slice(0,80):''}`, ok ? 'ok' : 'fail');

        try {
          const tasks = await fetchJSON('/api/tasks');

          computeAppStatuses(); renderSidebar(); renderTasksStage();

        state.runningTasks[taskId] = { ...state.runningTasks[taskId], status: s.status };

  // ----- Judge -----
  async function judgeTask(taskId, runId, trajSubdir) {

    try {
      const r = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/judge`, { run_id: runId, traj_subdir: trajSubdir || '' });
      const judge = r.result || r;
      if (!judge || judge.status === 'error') { toast(judge?.error || 'Judge failed', 'fail'); return; }
      toast(`Judge: ${(judge.accuracy*100).toFixed(0)}% agree`, 'ok');
      openJudgeModal(taskId, judge);
    } catch (e) { toast(e.message, 'fail'); }

  // ----- Trajectory viewer -----
  async function openTrajectory(taskId, preferredRunId, preferredTrajSubdir) {
    openModalLg(`Trajectory · ${taskId}`, '', '<div class="empty"><p>Loading…</p></div>');
    try {
      const list = await fetchJSON(`/api/tasks/${encodeURIComponent(taskId)}/trajectories`);
      const trajs = list.trajectories || list || [];
      if (!trajs.length) { $('modal-body').innerHTML = '<div class="empty"><p>No trajectories.</p></div>'; return; }
      let initial = trajs[0];
      if (preferredRunId) {
        const match = trajs.find(t =>
          t.run_id === preferredRunId &&
          (!preferredTrajSubdir || t.traj_subdir === preferredTrajSubdir));

      }
      await loadTrajectoryInto(taskId, initial.run_id, initial.traj_subdir, initial.source || 'eval', trajs);
