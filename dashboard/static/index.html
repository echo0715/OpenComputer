  }
  async function loadTrajectoryInto(taskId, runId, trajSubdir, source, allTrajs) {
    $('modal-body').innerHTML = '<div class="empty"><p>Loading…</p></div>';
    try {
      const t = await fetchJSON(`/api/trajectory/${encodeURIComponent(runId)}/${encodeURIComponent(trajSubdir)}?source=${encodeURIComponent(source||'eval')}`);
      // Server returns trajectory steps under `trajectory` (eval) or `trajectory` (repair) keys.
      const steps = t.trajectory || t.steps || [];
      const checks = t.verification_details || [];
      const trajTabsHtml = (allTrajs||[]).length > 1 ? `
        <div class="row" style="margin-bottom:0.6rem;flex-wrap:wrap;gap:0.3rem;">
          ${allTrajs.map(tr => `
            <button class="btn xs ${tr.run_id===runId && tr.traj_subdir===trajSubdir?'primary':''}" onclick="loadTrajectoryInto(${JSON.stringify(taskId).replace(/"/g,'&quot;')}, ${JSON.stringify(tr.run_id).replace(/"/g,'&quot;')}, ${JSON.stringify(tr.traj_subdir).replace(/"/g,'&quot;')}, ${JSON.stringify(tr.source||'eval').replace(/"/g,'&quot;')}, ${JSON.stringify(allTrajs).replace(/"/g,'&quot;')})">
              ${tr.model||'?'} · ${tr.reward!==undefined?(tr.reward*100).toFixed(0)+'%':'—'}${tr.source==='repair'?' · repair':''}
            </button>`).join('')}
        </div>` : '';
      $('modal-sub').textContent = `${t.model || ''} · ${steps.length} steps · ${t.reward!==undefined?'reward '+t.reward:''} · ${runId}`;
      $('modal-body').innerHTML = `
        ${trajTabsHtml}
        ${t.task ? `<div class="markdown" style="margin-bottom:0.7rem;"><strong>Task:</strong> ${escapeHtml(t.task)}</div>` : ''}
        <div class="row" style="margin-bottom:0.6rem;">
          <span class="chip ${t.reward===1?'ok':t.reward>0?'warn':'fail'}">reward ${t.reward!==undefined?t.reward:'—'}</span>
          <span class="chip">${t.checks_passed||0} / ${t.checks_total||0} checks</span>
          <span class="chip diff">${t.agent_steps||steps.length} steps</span>
          <span class="grow"></span>
          <button class="btn sm ghost" onclick="judgeTask(${JSON.stringify(taskId).replace(/"/g,'&quot;')}, ${JSON.stringify(runId).replace(/"/g,'&quot;')}, ${JSON.stringify(trajSubdir).replace(/"/g,'&quot;')})">Run LLM judge</button>
        </div>
        ${checks.length ? `
          <div class="row" style="margin-bottom:0.4rem;"><span class="label-mono">verification (${checks.length})</span></div>
          ${checks.map(c => verificationRowHtml(c)).join('')}
        ` : ''}
        <div class="row" style="margin:0.9rem 0 0.4rem;"><span class="label-mono">steps (${steps.length})</span></div>
        ${steps.length ? `<div class="trajectory-list">${steps.map((s, i) => stepRowHtml(s, i, runId, trajSubdir, source, trajSubdir)).join('')}</div>` : '<div class="empty"><p>No steps recorded.</p></div>'}
      `;
      // Activate first step + start scroll/hover-driven focus.
      initTrajectoryScrollState();
    } catch (e) { $('modal-body').innerHTML = `<div class="empty"><p>Failed: ${escapeHtml(e.message)}</p></div>`; }
  }

  function verificationRowHtml(c) {
    const fmt = (v) => v === undefined ? '' : typeof v === 'string' ? v : JSON.stringify(v);
    const expected = c.expected;
    const actual = c.actual;
    const showExp = expected !== undefined;
    const showAct = actual !== undefined;
    return `
      <div class="judge-row">
        <span class="chip ${c.passed?'ok':'fail'}">${c.passed?'pass':'fail'}</span>
        <div>
          <div class="jr-name">${escapeHtml(c.key || c.name || '')}</div>
          ${c.command ? `<div class="jr-reason"><code>${escapeHtml(c.command)}</code></div>` : ''}
          ${(showExp || showAct) ? `<div class="jr-reason">${showExp ? `expected <code>${escapeHtml(fmt(expected))}</code>` : ''}${showExp && showAct ? ' · ' : ''}${showAct ? `actual <code>${escapeHtml(fmt(actual))}</code>` : ''}</div>` : ''}
          ${c.reason ? `<div class="jr-reason">${escapeHtml(c.reason)}</div>` : ''}
        </div>
        <span></span>
      </div>`;
  }

  function stepRowHtml(s, i, runId, trajSubdir, source) {
    // Eval steps use {step, reasoning, actions[], action_results[], screenshot_file}.
    // Repair steps may use {thought/thinking, action, observation_type, screenshot}.
    const stepNum = s.step != null ? s.step : (i + 1);
    const reasoning = s.reasoning || s.thought || s.thinking || '';
    const rawActions = Array.isArray(s.actions) ? s.actions
                     : (s.action ? [s.action] : []);
    const rawResults = Array.isArray(s.action_results) ? s.action_results : [];

    // Dedupe consecutive identical (action, description, success) entries — same as classic.
    const compact = [];
    rawActions.forEach((act, idx) => {
      const r = rawResults[idx] || {};
      const prev = compact[compact.length - 1];
      const sameAsPrev = prev
        && prev.action === act
        && (prev.result.description || '') === (r.description || '')
        && prev.result.success === r.success;
      if (sameAsPrev) return;
      compact.push({ action: act, result: r });
    });

    // Screenshot — server expects the bare filename (it joins with screenshots/<filename>).
    const ssFile = s.screenshot_file || s.screenshot || s.image || '';
    const shotName = ssFile ? ssFile.split('/').pop() : '';
    const shotUrl = shotName
      ? `/api/trajectory/${encodeURIComponent(runId)}/${encodeURIComponent(trajSubdir)}/screenshot/${encodeURIComponent(shotName)}?source=${encodeURIComponent(source||'eval')}`
      : '';

    const actionsHtml = compact.map(({action, result}) => {
      const cls = result.success === false ? 'fail' : '';
      const desc = result.description || '';
      return `
        <div class="step-action-code">${escapeHtml(typeof action === 'string' ? action : JSON.stringify(action))}</div>
        ${desc ? `<div class="step-action-result ${cls}">${escapeHtml(desc)}</div>` : ''}`;
    }).join('');

    const stepKey = `${trajSubdir}-${stepNum}`;
    return `
      <div class="trajectory-step ${i === 0 ? 'active' : ''}" id="step-${stepKey}">
        <div class="trajectory-step-text">
          <div class="trajectory-step-head">
            <span class="step-num">Step ${stepNum}</span>
          </div>
          ${reasoning ? `
            <div class="trajectory-step-reasoning-label">Reasoning</div>
            <div class="trajectory-step-reasoning">${escapeHtml(reasoning)}</div>
          ` : ''}
          ${actionsHtml ? `
            <div class="step-actions-label">Actions</div>
            ${actionsHtml}
          ` : ''}
        </div>
        <div class="trajectory-step-media">
          ${shotUrl ? `
            <div class="trajectory-step-media-frame">
              <img class="trajectory-step-image" src="${shotUrl}" loading="lazy" onclick="openLightbox('${shotUrl}')" alt="Step ${stepNum}">
            </div>
          ` : `<div class="trajectory-step-media-frame placeholder">no screenshot</div>`}
        </div>
      </div>`;
  }

  // ----- Trajectory scroll/hover focus (matches classic dashboard) -----
  let _trajObserver = null;
  let _trajPointerHandler = null;
  let _trajLeaveHandler = null;
  function setActiveTrajectoryStep(stepEl) {
    if (!stepEl) return;
    document.querySelectorAll('#modal-body .trajectory-step.active').forEach(el => {
      if (el !== stepEl) el.classList.remove('active');
    });
    stepEl.classList.add('active');
  }
  function findFocusedTrajectoryStep(root, steps) {
    if (!root || !steps.length) return null;
    const rootRect = root.getBoundingClientRect();
    const focusLine = root.clientHeight * 0.28;
    let best = null, bestDist = Infinity;
    for (const step of steps) {
      const rect = step.getBoundingClientRect();
      const visTop = Math.max(rect.top, rootRect.top);
      const visBot = Math.min(rect.bottom, rootRect.bottom);
      if (visBot <= visTop) continue;
      const dist = Math.abs(rect.top - rootRect.top - focusLine);
      if (dist < bestDist) { bestDist = dist; best = step; }
    }
    return best;
  }
  function initTrajectoryScrollState() {
    cleanupTrajectoryScrollState();
    const root = $('modal-body');
    const steps = Array.from(document.querySelectorAll('#modal-body .trajectory-step'));
    if (!root || !steps.length) return;
    _trajObserver = new IntersectionObserver(() => {
      const focused = findFocusedTrajectoryStep(root, steps);
      if (focused) setActiveTrajectoryStep(focused);
    }, { root, threshold: [0.2, 0.45, 0.7], rootMargin: '-8% 0px -38% 0px' });
    steps.forEach(s => _trajObserver.observe(s));
    _trajPointerHandler = (e) => {
      const step = e.target.closest('#modal-body .trajectory-step');
      if (step) setActiveTrajectoryStep(step);
    };
    _trajLeaveHandler = () => {
      const focused = findFocusedTrajectoryStep(root, steps);
      if (focused) setActiveTrajectoryStep(focused);
    };
    root.addEventListener('pointermove', _trajPointerHandler);
    root.addEventListener('mouseleave', _trajLeaveHandler);
  }
  function cleanupTrajectoryScrollState() {
    if (_trajObserver) { _trajObserver.disconnect(); _trajObserver = null; }
    const root = $('modal-body');
    if (root && _trajPointerHandler) { root.removeEventListener('pointermove', _trajPointerHandler); _trajPointerHandler = null; }
    if (root && _trajLeaveHandler)   { root.removeEventListener('mouseleave', _trajLeaveHandler); _trajLeaveHandler = null; }
  }

  function renderTraceEvents(events) {
    if (!events || !events.length) return '<div class="muted" style="font-size:0.82rem;padding:0.4rem 0;">awaiting events…</div>';
    const trunc = (s, n) => {
      if (s == null) return '';
      const flat = String(s).replace(/\s+/g, ' ').trim();
      return flat.length > n ? flat.slice(0, n) + '…' : flat;
    };
    const toolSummary = (name, input) => {
      if (!input || typeof input !== 'object') return name || '';
      if (name === 'Bash') {
        const cmd = trunc(input.command, 120);
        return input.description ? `${input.description} · ${cmd}` : cmd;
      }
      if (name === 'Read') return input.file_path || '';
      if (name === 'Edit' || name === 'MultiEdit') {
        return `${input.file_path || ''} · ${trunc(input.old_string, 50)} → ${trunc(input.new_string, 50)}`;
      }
      if (name === 'Write') return `${input.file_path || ''} (${(input.content || '').length} chars)`;
      if (name === 'Glob') return (input.pattern || '') + (input.path ? ` in ${input.path}` : '');
      if (name === 'Grep') return (input.pattern || '') + (input.path ? ` in ${input.path}` : '');
      if (name === 'TodoWrite') {
        const t = input.todos || [];
        return `${t.length} todo${t.length===1?'':'s'}` + (t[0] ? ` — ${trunc(t[0].content, 70)}` : '');
      }
      if (name === 'Task' || name === 'Agent') return trunc(input.description || input.prompt, 140);
      return trunc(JSON.stringify(input), 120);
    };
    const rows = [];
    const push = (kind, tag, msg) => {
      rows.push(`<div class="trace-event ${kind}"><span class="te-tag">${escapeHtml(tag)}</span><span class="te-msg">${escapeHtml(msg)}</span></div>`);
    };
    for (const ev of events) {
      const t = ev.type;
      if (t === 'system_init') {
        const sid = ev.session_id ? ` · ${ev.session_id.slice(0, 8)}` : '';
        push('text', 'init', `model=${ev.model || '?'}${sid}`);
      } else if (t === 'assistant') {
        for (const b of (ev.blocks || [])) {
          if (b.type === 'text') {
            const txt = trunc(b.text, 240);
            if (txt) push('text', 'text', txt);
          } else if (b.type === 'thinking') {
            const txt = trunc(b.text, 200);
            if (txt) push('thinking', 'think', txt);
          } else if (b.type === 'tool_use') {
            push('tool', b.name || 'tool', toolSummary(b.name, b.input));
          }
        }
      } else if (t === 'tool_result_batch') {
        for (const r of (ev.results || [])) {
          const cls = r.is_error ? 'error' : 'tool';
          const tag = r.is_error ? 'error' : 'result';
          const text = r.text || '';
          const lines = text.split('\n').filter(l => l.trim());
          const first = lines[0] || '(empty)';
          const more = lines.length > 1 ? `  (+${lines.length - 1} more line${lines.length === 2 ? '' : 's'})` : '';
          push(cls, tag, trunc(first, 140) + more);
        }
      } else if (t === 'result') {
        const cls = ev.is_error ? 'error' : 'result';
        const tag = ev.is_error ? 'failed' : 'done';
        const dur = ev.duration_ms != null ? ` ${(ev.duration_ms/1000).toFixed(1)}s` : '';
        const turns = ev.num_turns ? ` · ${ev.num_turns} turns` : '';
        push(cls, tag, `${ev.subtype || ''}${dur}${turns}`.trim() || 'finished');
      }
    }
    if (!rows.length) return '<div class="muted" style="font-size:0.82rem;padding:0.4rem 0;">awaiting events…</div>';
    return rows.join('');
  }

          <div class="filter-row">

            </select>
            <select id="bm-difficulty">
              <option value="">All difficulties</option>
              ${[1,2,3,4,5].map(d => `<option value="${d}" ${state.benchmarkDifficulty==String(d)?'selected':''}>difficulty ${d}</option>`).join('')}
            </select>
          </div>
          <div class="stack" id="bm-task-list">
            ${filtered.length ? filtered.slice(0, 200).map(taskCardHtml).join('') : '<div class="empty"><p>No tasks match.</p></div>'}
          </div>
          ${filtered.length > 200 ? `<p class="muted" style="margin-top:0.6rem;text-align:center;font-size:0.84rem;">Showing first 200 of ${filtered.length}.</p>` : ''}
        </div>
      </div>
    `;

    $('bm-run-filter').onchange = (e) => { state.benchmarkRunFilter = e.target.value; loadBenchmark().then(renderBenchmarkOverview); };
    $('bm-search').oninput      = (e) => { state.benchmarkSearch = e.target.value; debouncedRenderBenchmark(); };

    $('bm-difficulty').onchange = (e) => { state.benchmarkDifficulty = e.target.value; renderBenchmarkOverview(); };

    if (!summary) loadBenchmark().then(renderBenchmarkOverview);
  }
  let bmDebounceTimer;
  function debouncedRenderBenchmark() {
    clearTimeout(bmDebounceTimer);
    bmDebounceTimer = setTimeout(() => state.section === 'benchmark' && (state.currentApp ? renderBenchmarkAppView() : renderBenchmarkOverview()), 250);
  }

  // ============================================================
  // BENCHMARK — per-app
  // ============================================================
  async function renderBenchmarkAppView() {
    const name = state.currentApp;
    const a = state.apps[name];
    if (!state.benchmarkSummary) await loadBenchmark();

    // Filter to this app
    const appTasks = (state.benchmarkTasks || []).filter(t => t.app === name);
    const appSummary = (state.benchmarkSummary?.by_app || []).find(r => r.app === name) || {};

    // Per-model aggregate from runs_by_model — scope to filter when active
    const filterActive = state.benchmarkRunFilter && state.benchmarkRunFilter !== 'none';
    const byModel = {};
    for (const t of appTasks) {
      const rbm = t.runs_by_model || {};
      for (const k of Object.keys(rbm)) {
        const r = rbm[k];
        // When a specific run is filtered, only count that run's entries
        if (filterActive && r.run_id !== state.benchmarkRunFilter) continue;
        const parts = k.split(':');
        const source = parts.length > 1 ? parts[0] : 'eval';
        const model = parts.length > 1 ? parts.slice(1).join(':') : k;
        const m = byModel[k] = byModel[k] || { key: k, source, model, runs: 0, passes: 0, rewards: [], checks_p: 0, checks_t: 0 };
        m.runs++;
        if (r.reward === 1) m.passes++;
        if (typeof r.reward === 'number') m.rewards.push(r.reward);
        if (typeof r.checks_passed === 'number') m.checks_p += r.checks_passed;
        if (typeof r.checks_total === 'number')  m.checks_t += r.checks_total;
      }
    }
    const modelRows = Object.values(byModel).sort((a,b) => b.runs - a.runs);

    const filteredTasks = appTasks.filter(t => {
      // Hide tasks that didn't run in the selected run
      if (filterActive && !t.last_run) return false;
      const q = state.benchmarkSearch.toLowerCase();
      const diff = state.benchmarkDifficulty;
      if (diff && String(t.metadata?.difficulty || '') !== diff) return false;
      if (q && !`${t.id} ${t.task||''}`.toLowerCase().includes(q)) return false;
      return true;
    });

    $('main').innerHTML = `
      <div class="app-header">
        <div class="ah-icon" style="background:${a.color};color:${a.text};">${a.label}</div>
        <div>
          <h1>${name}</h1>
          <div class="ah-meta">
            <span class="ai-dot ${appOverall(a)}" style="display:inline-block;"></span>
            benchmark · ${appSummary.task_count || appTasks.length} tasks · ${appSummary.result_count || 0} results
          </div>
        </div>
        <div class="app-header-actions">
          <button class="btn ghost sm" onclick="state.section='synthetic';renderSidebar();renderMain();">→ Synthetic</button>
          <button class="btn ghost sm" onclick="reloadBenchmark()">
            <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
            Reload
          </button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-eyebrow">App benchmark</div>
            <div class="panel-title">${name} · summary</div>
            <div class="panel-sub">${state.benchmarkSummary?.scope?.label || 'Latest per task across all runs'}</div>
          </div>
          <div class="panel-actions">
            <select id="bm-run-filter" style="font-size:0.85rem;padding:0.35rem 0.55rem;">
              <option value="">Latest per task (all runs)</option>
              <option value="none" ${state.benchmarkRunFilter==='none'?'selected':''}>No run (raw tasks)</option>
              ${state.runs.map(r => `<option value="${r.run_id}" ${r.run_id===state.benchmarkRunFilter?'selected':''}>${r.source==='repair'?'[repair] ':''}${r.model} · ${r.task_count} tasks</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="panel-body">
          <div class="kpi-row" style="grid-template-columns:repeat(6,1fr);">
            <div class="kpi"><div class="kpi-label">Tasks</div><div class="kpi-value">${appSummary.task_count||appTasks.length}</div></div>
            <div class="kpi"><div class="kpi-label">Results</div><div class="kpi-value">${appSummary.result_count||0}</div></div>
            <div class="kpi"><div class="kpi-label">Avg reward</div><div class="kpi-value">${fmtRew(appSummary.avg_reward)}</div></div>
            <div class="kpi"><div class="kpi-label">Pass rate</div><div class="kpi-value">${fmtPct(appSummary.pass_rate)}</div></div>
            <div class="kpi"><div class="kpi-label">Avg accuracy</div><div class="kpi-value">${fmtPct(appSummary.avg_accuracy)}</div></div>
            <div class="kpi"><div class="kpi-label">Judged</div><div class="kpi-value">${appSummary.judged_count||0}</div></div>
          </div>
          ${modelRows.length ? `
            <div class="row" style="margin:1rem 0 0.4rem;">
              <span class="label-mono">By model · ${modelRows.length}</span>
            </div>
            <table class="summary-table">
              <thead>
                <tr>
                  <th>Model</th>
                  <th>Source</th>
                  <th class="right">Runs</th>
                  <th class="right">Pass rate</th>
                  <th class="right">Avg reward</th>
                  <th class="right">Checks</th>
                </tr>
              </thead>
              <tbody>
                ${modelRows.map(m => {
                  const passRate = m.runs ? m.passes / m.runs : null;
                  const avgRew = m.rewards.length ? m.rewards.reduce((a,b)=>a+b,0) / m.rewards.length : null;
                  return `<tr style="cursor:default;">
                    <td><strong>${m.model}</strong></td>
                    <td><span class="chip ${m.source==='repair'?'accent':'diff'}">${m.source}</span></td>
                    <td class="right">${m.runs}</td>
                    <td class="right">${pctBar(passRate)}</td>
                    <td class="right">${fmtRew(avgRew)}</td>
                    <td class="right">${m.checks_p}/${m.checks_t}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>` : '<div class="empty"><p>No model results yet for this app.</p></div>'}
        </div>
      </div>

      <div class="panel" style="margin-top:1.2rem;">
        <div class="panel-head">
          <div>
            <div class="panel-eyebrow">Tasks</div>
            <div class="panel-title">${name} tasks</div>
            <div class="panel-sub">${filteredTasks.length} of ${appTasks.length}</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="filter-row">
            <input type="search" id="bm-search" class="grow" placeholder="Search id / description…" value="${escapeHtml(state.benchmarkSearch)}" />
            <select id="bm-difficulty">
              <option value="">All difficulties</option>
              ${[1,2,3,4,5].map(d => `<option value="${d}" ${state.benchmarkDifficulty==String(d)?'selected':''}>difficulty ${d}</option>`).join('')}
            </select>
          </div>
          <div class="stack">
            ${filteredTasks.length ? filteredTasks.map(taskCardHtml).join('') : '<div class="empty"><p>No tasks match.</p></div>'}
          </div>
        </div>
      </div>
    `;

    $('bm-run-filter').onchange = (e) => { state.benchmarkRunFilter = e.target.value; loadBenchmark().then(renderBenchmarkAppView); };
    $('bm-search').oninput      = (e) => { state.benchmarkSearch = e.target.value; debouncedRenderBenchmark(); };
    $('bm-difficulty').onchange = (e) => { state.benchmarkDifficulty = e.target.value; renderBenchmarkAppView(); };
  }

  function fmtPct(v) { return v == null ? '—' : `${(v * 100).toFixed(1)}%`; }
  function fmtRew(v) { return v == null ? '—' : v.toFixed(2); }
  function applyBenchmarkFilters(tasks) {
    const q = state.benchmarkSearch.toLowerCase();
    const diff = state.benchmarkDifficulty;
    const app = state.benchmarkAppFilter;
    const filterActive = state.benchmarkRunFilter && state.benchmarkRunFilter !== 'none';
    return tasks.filter(t => {
      if (filterActive && !t.last_run) return false;
      if (app && t.app !== app) return false;
      if (diff && String(t.metadata?.difficulty || '') !== diff) return false;
      if (q) {
        const hay = `${t.id} ${t.task || ''} ${t.metadata?.description || ''}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }
  function renderBenchmarkSummary(summary) {
    const o = summary.overall || {};
    const fmtPct = (v) => v == null ? '—' : `${(v * 100).toFixed(1)}%`;
    const fmtRew = (v) => v == null ? '—' : v.toFixed(2);
    const kpis = `
      <div class="kpi-row" style="grid-template-columns:repeat(6,1fr);">
        <div class="kpi"><div class="kpi-label">Tasks</div><div class="kpi-value">${o.task_count||0}</div></div>
        <div class="kpi"><div class="kpi-label">Results</div><div class="kpi-value">${o.result_count||0}</div></div>
        <div class="kpi"><div class="kpi-label">Avg reward</div><div class="kpi-value">${fmtRew(o.avg_reward)}</div></div>
        <div class="kpi"><div class="kpi-label">Pass rate</div><div class="kpi-value">${fmtPct(o.pass_rate)}</div></div>
        <div class="kpi"><div class="kpi-label">Avg accuracy</div><div class="kpi-value">${fmtPct(o.avg_accuracy)}</div></div>
        <div class="kpi"><div class="kpi-label">Judged</div><div class="kpi-value">${o.judged_count||0}</div></div>
      </div>
    `;
    const byApp = (summary.by_app || []).filter(r => r.task_count > 0);
    const tableHtml = byApp.length ? `
      <table class="summary-table">
        <thead>
          <tr>
            <th>App</th>
            <th class="right">Tasks</th>
            <th class="right">Results</th>
            <th class="right">Avg reward</th>
            <th class="right">Pass rate</th>
            <th class="right">Avg accuracy</th>
            <th class="right">Judged</th>
          </tr>
        </thead>
        <tbody>
          ${byApp.map(r => `
            <tr onclick="state.currentApp='${r.app}'; renderSidebar(); renderMain();">
              <td>${r.app}</td>
              <td class="right">${r.task_count}</td>
              <td class="right">${r.result_count}</td>
              <td class="right">${fmtRew(r.avg_reward)}</td>
              <td class="right">${pctBar(r.pass_rate)}</td>
              <td class="right">${pctBar(r.avg_accuracy)}</td>
              <td class="right">${r.judged_count}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    ` : '<div class="empty"><p>No results to summarize for this scope.</p></div>';
    return kpis + tableHtml;
  }
  function pctBar(v) {
    if (v == null) return '—';
    const pct = Math.round(v * 100);
    const cls = pct >= 75 ? 'ok' : pct >= 40 ? 'warn' : 'fail';
    return `<span class="pct-bar ${cls}"><span style="width:${pct}%"></span></span>${pct}%`;
  }
  async function loadBenchmark() {
    const rf = state.benchmarkRunFilter;
    const qs = rf ? `?run=${encodeURIComponent(rf)}` : '';
    try {
      const [summary, tasks] = await Promise.all([
        fetchJSON(`/api/summary${qs}`).catch(() => null),
        fetchJSON(`/api/tasks${qs}`).catch(() => []),
      ]);
      state.benchmarkSummary = summary;
      state.benchmarkTasks = tasks || [];
    } catch (e) {
      toast('Benchmark load failed: ' + e.message, 'fail');
    }
  }
  async function reloadBenchmark() {
    toast('Reloading benchmark…');
    state.benchmarkSummary = null;
    await loadBenchmark();
    if (state.section === 'benchmark') {
      state.currentApp ? renderBenchmarkAppView() : renderBenchmarkOverview();
    }
    toast('Benchmark reloaded', 'ok');
  }

  // ============================================================
  // STAGE 4 — REPAIR
  // ============================================================
  function renderRepairStage() {
    const name = state.currentApp;
    const tasks = state.appsTasks[name] || [];
    const withRepair = [];
    for (const t of tasks) {
      const rbm = t.runs_by_model || {};
      const repairKeys = Object.keys(rbm).filter(k => k.startsWith('repair:'));
      if (repairKeys.length) {
        const runs = repairKeys.map(k => ({ key: k, model: k.slice(7), ...rbm[k] }));
        const solved = runs.some(r => r.reward === 1);
        withRepair.push({ task: t, runs, solved });
      }
    }
    $('panel-head').innerHTML = `
      <div>
        <div class="panel-eyebrow">Stage 04 · Repair (optional)</div>
        <div class="panel-title">Tasks with repair runs</div>
        <div class="panel-sub">evaluation/repair/runs/&lt;task_id&gt;_&lt;ts&gt;/SOLVED.md</div>
      </div>
      <div class="panel-actions">
        <span class="label-mono">${withRepair.length} task${withRepair.length===1?'':'s'}</span>
      </div>
    `;
    if (!withRepair.length) {
      $('panel-body').innerHTML = `
        <div class="empty">
          <div class="empty-icon">⟳</div>
          <p>No repair runs for <code>${name}</code>.</p>
          <div class="empty-cmd">python evaluation/repair/repair_loop.py --app ${name} --task &lt;task_id&gt; --max-rounds 3</div>
        </div>`;
      return;
    }
    const totalRuns = withRepair.reduce((s,r) => s + r.runs.length, 0);
    const solvedCount = withRepair.filter(r => r.solved).length;
    $('panel-body').innerHTML = `
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">Tasks</div><div class="kpi-value">${withRepair.length}</div></div>
        <div class="kpi"><div class="kpi-label">Solved</div><div class="kpi-value">${solvedCount}</div></div>
        <div class="kpi"><div class="kpi-label">Runs</div><div class="kpi-value">${totalRuns}</div></div>
        <div class="kpi"><div class="kpi-label">Models</div><div class="kpi-value">${new Set(withRepair.flatMap(r => r.runs.map(x=>x.model))).size}</div></div>
      </div>
      <div class="stack">
        ${withRepair.map(({task, runs, solved}) => `
          <div class="card" onclick="openTaskJson(${JSON.stringify(task.id).replace(/"/g,'&quot;')})">
            <div class="card-head">
              <span class="card-id">${task.id}</span>
              <span class="card-title">${escapeHtml(task.task || task.id)}</span>
              <span class="chip ${solved?'ok':'warn'}">${solved?'solved':'unsolved'}</span>
            </div>
            <div class="card-meta">
              ${runs.map(r => `<span class="chip ${r.reward===1?'ok':'warn'}">${r.model}: ${r.checks_passed||0}/${r.checks_total||0}</span>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>`;
  }

  // ============================================================
  // SMOKE TASK / RUN modals (read-only viewers)

  async function openSmokeTask(app, taskId) {
    openModal(`smoke task · ${taskId}`, app, '<div class="empty"><p>Loading…</p></div>');
    try {
      const d = await fetchJSON(`/api/synthesis/smoke/task/${encodeURIComponent(app)}/${encodeURIComponent(taskId)}`);
      $('modal-sub').textContent = `${d.status}${d.latest_ts ? ' · ' + relTime(d.latest_ts) : ''}`;
      let body = '';
      if (d.solved_md) body += `<div class="markdown">${renderMarkdown(d.solved_md)}</div>`;
      if (d.error_text) body += `<div class="row" style="margin:0.6rem 0;"><span class="label-mono">error.txt</span></div><div class="code">${escapeHtml(d.error_text)}</div>`;
      if (!d.solved_md && !d.error_text) body = `<div class="empty"><p>No SOLVED.md or error.txt for this task.</p></div>`;
      $('modal-body').innerHTML = body;
    } catch (e) { $('modal-body').innerHTML = `<div class="empty"><p>${escapeHtml(e.message)}</p></div>`; }

  async function openSmokeRun(runId) {
    openModalLg(`smoke run · ${runId}`, '', '<div class="empty"><p>Loading…</p></div>');
    try {
      const d = await fetchJSON(`/api/synthesis/smoke/runs/${encodeURIComponent(runId)}`);
      const tasksHtml = (d.tasks || []).map(t => `

          <div><div class="a-name">${t.id}</div></div>
          ${t.has_solved ? `<button class="a-action" onclick="showSolvedMd(${JSON.stringify(t.id).replace(/"/g,'&quot;')}, ${JSON.stringify(t.solved_md||'').replace(/"/g,'&quot;')})">SOLVED.md</button>` : ''}

        ${tasksHtml ? `<div class="row" style="margin-bottom:0.5rem;"><span class="label-mono">tasks</span></div><div class="artifact-list">${tasksHtml}</div>` : ''}
        ${d.log_tail ? `<div class="row" style="margin-top:1rem;margin-bottom:0.5rem;"><span class="label-mono">log tail</span></div><div class="term">${escapeHtml(d.log_tail)}</div>` : ''}

  // VERIFIER FILE / ENDPOINT viewer
  // ============================================================
  async function openVerifierFile(app, filename) {
    openModal(`verifiers/${app}/${filename}`, '', '<div class="empty"><p>Loading…</p></div>');
    try {
      const txt = await fetchText(`/api/synthesis/verifiers/${encodeURIComponent(app)}/file/${encodeURIComponent(filename)}`);

  async function openReadme(app)         { return openVerifierFile(app, 'README.md'); }
  async function openTestMd(app)         { return openVerifierFile(app, 'Test.md'); }
  async function openVerifierSource(app) { return openVerifierFile(app, `${app}.py`); }
  async function openEndpointSource(app, name) {
    openModal(`${app}.py · ${name}`, 'endpoint source', '<div class="empty"><p>Loading…</p></div>');
    try {
      const src = await fetchText(`/api/synthesis/verifiers/${encodeURIComponent(app)}/file/${encodeURIComponent(app)}.py`);
      const idx = src.indexOf(`"${name}"`) >= 0 ? src.indexOf(`"${name}"`) : src.indexOf(`'${name}'`);
      let snippet = src;
      if (idx >= 0) {
        const start = Math.max(0, src.lastIndexOf('\n', idx - 80));
        const end = src.indexOf('\n\n\n', idx);
        snippet = src.slice(start, end > 0 ? end : Math.min(src.length, idx + 1400));
      }
      $('modal-body').innerHTML = `<div class="code">${escapeHtml(snippet)}</div>`;
    } catch (e) { $('modal-body').innerHTML = `<div class="empty"><p>${escapeHtml(e.message)}</p></div>`; }
  }

  function openTrace(title, payload) {
    const events = (payload && payload.events) || [];
    openModal(title, `${events.length} events`, `<div class="trace-events">${renderTraceEvents(events)}</div>${payload?.output ? `<div class="row" style="margin-top:0.6rem;"><span class="label-mono">output</span></div><div class="term">${escapeHtml(payload.output)}</div>` : ''}`, [{ label: 'Close', cls: 'ghost', onclick: 'closeModal()' }]);

  // ============================================================
  // ADD NEW APP
  // ============================================================
  function startAddAppInline() {
    $('add-app-btn').style.display = 'none';
    const wrap = $('add-app-inline');
    wrap.style.display = '';
    const err = $('add-app-inline-err');
    err.style.display = 'none';
    const el = $('add-app-inline-name');
    el.value = '';
    el.focus();
    el.onkeydown = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); confirmAddAppInline(); }
      else if (e.key === 'Escape') { e.preventDefault(); cancelAddAppInline(); }
    };
    el.onblur = () => {
      // Cancel on blur if the field is empty (matches "new file" UX)
      setTimeout(() => {
        if (wrap.style.display !== 'none' && !el.value.trim()) cancelAddAppInline();
      }, 120);
    };
  }
  function cancelAddAppInline() {
    $('add-app-inline').style.display = 'none';
    $('add-app-inline-err').style.display = 'none';
    $('add-app-btn').style.display = '';
  }
  async function confirmAddAppInline() {
    const el = $('add-app-inline-name');
    const err = $('add-app-inline-err');
    const showErr = (msg) => { err.textContent = msg; err.style.display = ''; };
    err.style.display = 'none';

    const name = (el.value || '').trim();
    if (!name) { showErr('Name required'); return; }
    if (!/^[a-zA-Z0-9_-]+$/.test(name)) { showErr('Use letters, numbers, _, - only'); return; }
    if (state.apps[name]) { showErr(`"${name}" already exists`); return; }

    try {
      const r = await postJSON(`/api/synthesis/verifiers/${encodeURIComponent(name)}/create`, {});
      if (r.error) { showErr(r.error); return; }
    } catch (e) {
      showErr(e.message || 'Failed');
      return;
    }

    cancelAddAppInline();
    toast(`Created ${name}`);
    try { state.verifiers = await fetchJSON('/api/synthesis/verifiers'); } catch {}
    buildAppIndex(); computeAppStatuses(); applyAppSearch();
    state.currentApp = name; state.currentStage = 'verifier';
    renderSidebar(); renderMain();
  }

  // ============================================================
  // MODAL HELPERS
  // ============================================================
  function openModal(title, sub, bodyHtml, footActions) {
    $('modal').classList.remove('lg', 'sm');
    $('modal-title').textContent = title;
    $('modal-sub').textContent = sub || '';
    $('modal-body').innerHTML = bodyHtml;
    setModalFoot(footActions);
    $('modal-back').classList.add('show');
  }
  function openModalLg(title, sub, bodyHtml, footActions) {
    openModal(title, sub, bodyHtml, footActions);
    $('modal').classList.add('lg');
  }
  function setModalFoot(actions) {
    const foot = $('modal-foot');
    if (!actions || !actions.length) { foot.style.display = 'none'; foot.innerHTML = ''; return; }
    foot.style.display = 'flex';
    foot.innerHTML = actions.map(a => `<button class="btn ${a.cls||''}" onclick="${a.onclick}">${a.label}</button>`).join('');
  }
  function closeModal() {
    cleanupTrajectoryScrollState();
    $('modal-back').classList.remove('show');
    $('modal').classList.remove('lg', 'sm');
    setModalFoot(null);
  }
  $('modal-close').onclick = closeModal;
  $('modal-back').addEventListener('click', e => { if (e.target.id === 'modal-back') closeModal(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if ($('lightbox').classList.contains('show')) { $('lightbox').classList.remove('show'); $('lightbox-img').src=''; }
      else closeModal();
    }
  });

  // ============================================================
  // UTILITIES
  // ============================================================
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function formatBytes(n) {
    if (n == null) return '';
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${(n/1024).toFixed(1)} KB`;
    return `${(n/1024/1024).toFixed(2)} MB`;
  }
  function relTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    const s = (Date.now() - d.getTime()) / 1000;
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    if (s < 86400*30) return `${Math.floor(s/86400)}d ago`;
    return d.toLocaleDateString();
  }
  function renderMarkdown(src) {
    if (!src) return '';
    const lines = src.split('\n');
    let html = '', inCode = false, codeBuf = [];
    let inList = false, listKind = null;
    const flushList = () => { if (inList) { html += `</${listKind}>`; inList = false; listKind = null; } };
    const inline = (t) => {
      let s = escapeHtml(t);
      s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
      s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      return s;
    };
    for (let i = 0; i < lines.length; i++) {
      const ln = lines[i];
      if (/^```/.test(ln)) {
        if (!inCode) { inCode = true; codeBuf = []; }
        else { inCode = false; flushList(); html += `<pre><code>${escapeHtml(codeBuf.join('\n'))}</code></pre>`; }
        continue;
      }
      if (inCode) { codeBuf.push(ln); continue; }
      const h = ln.match(/^(#{1,6})\s+(.*)$/);
      if (h) { flushList(); html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; continue; }
      const ul = ln.match(/^[-*]\s+(.*)$/);
      const ol = ln.match(/^\d+\.\s+(.*)$/);
      if (ul) {
        if (!inList || listKind !== 'ul') { flushList(); html += '<ul>'; inList = true; listKind = 'ul'; }
        html += `<li>${inline(ul[1])}</li>`; continue;
      }
      if (ol) {
        if (!inList || listKind !== 'ol') { flushList(); html += '<ol>'; inList = true; listKind = 'ol'; }
        html += `<li>${inline(ol[1])}</li>`; continue;
      }
      if (/^---+$/.test(ln.trim())) { flushList(); html += '<hr/>'; continue; }
      if (ln.trim() === '') { flushList(); continue; }
      flushList(); html += `<p>${inline(ln)}</p>`;
    }
    flushList();
    if (inCode) html += `<pre><code>${escapeHtml(codeBuf.join('\n'))}</code></pre>`;
    return html;
  }

  let toastTimer;
  function toast(msg, cls = '') {
    $('toast-msg').textContent = msg;
    $('toast').className = 'toast show ' + cls;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => $('toast').classList.remove('show'), cls === 'fail' ? 5000 : 2800);
  }

  // ============================================================
  // BOOT
  // ============================================================
  $('refresh-btn').onclick = async () => { toast('Refreshing…'); await loadAll(); toast('Refreshed', 'ok'); };
  $('add-app-btn').onclick = startAddAppInline;
  $('app-search').oninput = (e) => { state.appSearch = e.target.value; applyAppSearch(); renderSidebar(); };
  loadAll();
  </script>
</body>
</html>
