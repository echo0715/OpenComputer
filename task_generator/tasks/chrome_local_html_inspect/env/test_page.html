<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Page Heading</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 60%; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background-color: #4a90d9; color: white; }
    </style>
</head>
<body>
    <h1>Test Page Heading</h1>
    <p>This is a sample HTML page used for browser testing. It contains a data table below.</p>
    <table>
        <thead>
            <tr><th>Product</th><th>Price</th><th>Quantity</th></tr>
        </thead>
        <tbody>
            <tr><td>Widget A</td><td>$12.99</td><td>150</td></tr>
            <tr><td>Widget B</td><td>$24.50</td><td>85</td></tr>
            <tr><td>Widget C</td><td>$7.75</td><td>320</td></tr>
        </tbody>
    </table>
</body>
</html>
